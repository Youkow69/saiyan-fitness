/* =========================================
   HELPERS
   ========================================= */
const today=()=>new Date().toISOString().split('T')[0];
const weekStart=()=>{const d=new Date();d.setDate(d.getDate()-d.getDay()+1);return d.toISOString().split('T')[0]};
const load=(k,d)=>{try{const v=localStorage.getItem('sf3_'+k);return v?JSON.parse(v):d}catch(e){return d}};
const save=(k,v)=>{try{localStorage.setItem('sf3_'+k,JSON.stringify(v))}catch(e){}};
const fmt=n=>n.toLocaleString('fr-FR');

function calcPL(d){
  const vol=d.workouts.reduce((s,w)=>s+w.sets.reduce((a,st)=>a+(st.weight||0)*(st.reps||0),0),0);
  return Math.floor(vol+(d.profile.streak||0)*50+(Object.keys(d.prs||{}).length)*200+d.workouts.length*100);
}

function getTransform(pl){
  if(pl<=1000)return{name:'Humain',imgKey:'krillin',aura:'',color:'#888'};
  if(pl<=5000)return{name:'Saiyan',imgKey:'goku_base',aura:'aura-white',color:'#ffffff'};
  if(pl<=15000)return{name:'Super Saiyan',imgKey:'goku_ssj',aura:'aura-yellow',color:'#FFD700'};
  if(pl<=50000)return{name:'Super Saiyan 2',imgKey:'gohan',aura:'aura-yellow lightning-effect',color:'#FFD700'};
  if(pl<=100000)return{name:'Super Saiyan 3',imgKey:'goku_ssj',aura:'aura-yellow',color:'#FFA500'};
  if(pl<=500000)return{name:'Super Saiyan God',imgKey:'vegeta_blue',aura:'aura-pink',color:'#FF4C6A'};
  return{name:'Super Saiyan Blue',imgKey:'goku_blue',aura:'aura-blue',color:'#00BFFF'};
}

/* Robust image component with skeleton loading + colored badge fallback */
function CharImg({src,alt,className,style,charKey}){
  const[status,setStatus]=useState('loading');
  const meta=charKey&&CHAR_META[charKey]?CHAR_META[charKey]:{name:alt||'?',color:'#FFD700',initials:(alt||'??').substring(0,2).toUpperCase()};
  /* 10s timeout fallback for very slow connections */
  const timerRef=useRef(null);
  useEffect(()=>{
    timerRef.current=setTimeout(()=>setStatus(s=>s==='loading'?'error':s),10000);
    return()=>clearTimeout(timerRef.current);
  },[]);
  return html`<div class="relative ${className||''}" style=${style}>
    ${status==='loading' && html`<div class="absolute inset-0 flex items-center justify-center">
      <div class="w-3/4 h-3/4 rounded-full skeleton"/>
    </div>`}
    ${status==='error' && html`<div class="absolute inset-0 flex items-center justify-center">
      <div class="w-full h-full rounded-full flex flex-col items-center justify-center" style=${{background:'linear-gradient(135deg,'+meta.color+'33,'+meta.color+'11)',border:'2px solid '+meta.color+'44'}}>
        <span class="font-display text-lg" style=${{color:meta.color}}>${meta.initials}</span>
        <span class="text-[8px] text-gray-400 font-body mt-0.5">${meta.name}</span>
      </div>
    </div>`}
    <img src=${src} alt=${alt||meta.name}
      class="char-img w-full h-full object-contain ${status==='loaded'?'opacity-100':'opacity-0'} transition-opacity duration-300"
      loading="lazy" referrerpolicy="no-referrer"
      onLoad=${()=>{clearTimeout(timerRef.current);setStatus('loaded')}}
      onError=${()=>{clearTimeout(timerRef.current);setStatus('error')}}/>
  </div>`;
}

function PowerCounter({value,className}){
  const[disp,setDisp]=useState(0);
  const ref=useRef(null);
  useEffect(()=>{
    let s=disp,e=value,dur=1000,t0=performance.now();
    function tick(now){
      const p=Math.min((now-t0)/dur,1);
      const ease=1-Math.pow(1-p,3);
      setDisp(Math.floor(s+ease*(e-s)));
      if(p<1)ref.current=requestAnimationFrame(tick);
    }
    ref.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(ref.current);
  },[value]);
  return html`<span class=${className||''}>${fmt(disp)}</span>`;
}

/* =========================================
   APP
   ========================================= */
function App(){
  const[tab,setTab]=useState(0);
  const[data,setRaw]=useState(()=>{const s=load('data',null);return s?{...INIT,...s}:INIT});
  const[prFlash,setPrFlash]=useState(null);
  const[online,setOnline]=useState(navigator.onLine);
  const touchRef=useRef({x:0,y:0});

  const set=useCallback(fn=>{
    setRaw(prev=>{const next=typeof fn==='function'?fn(prev):{...prev,...fn};save('data',next);return next});
  },[]);

  const pl=useMemo(()=>calcPL(data),[data]);
  const tf=useMemo(()=>getTransform(pl),[pl]);

  const firePR=useCallback(msg=>{setPrFlash(msg);setTimeout(()=>setPrFlash(null),2200)},[]);

  // Online/offline
  useEffect(()=>{
    const on=()=>setOnline(true),off=()=>setOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off)};
  },[]);

  // Streak check
  useEffect(()=>{
    const t=today(),y=new Date(Date.now()-864e5).toISOString().split('T')[0];
    if(data.profile.lastWorkoutDate&&data.profile.lastWorkoutDate!==t&&data.profile.lastWorkoutDate!==y){
      set(d=>({...d,profile:{...d.profile,streak:0}}));
    }
  },[]);

  // Swipe between tabs
  const onTouchStart=useCallback(e=>{touchRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY}},[]);
  const onTouchEnd=useCallback(e=>{
    const dx=e.changedTouches[0].clientX-touchRef.current.x;
    const dy=e.changedTouches[0].clientY-touchRef.current.y;
    if(Math.abs(dx)>80&&Math.abs(dy)<60){
      if(dx<0&&tab<4)setTab(t=>t+1);
      if(dx>0&&tab>0)setTab(t=>t-1);
    }
  },[tab]);

  const pages=[
    html`<${HomePage} data=${data} set=${set} pl=${pl} tf=${tf} setTab=${setTab}/>`,
    html`<${TrainingPage} data=${data} set=${set} firePR=${firePR}/>`,
    html`<${StatsPage} data=${data} pl=${pl} tf=${tf}/>`,
    html`<${NutritionPage} data=${data} set=${set}/>`,
    html`<${ProfilePage} data=${data} set=${set} pl=${pl} tf=${tf}/>`
  ];

  return html`<div class="min-h-screen relative" onTouchStart=${onTouchStart} onTouchEnd=${onTouchEnd}>
    <!-- Offline banner -->
    ${!online && html`<div class="fixed top-0 left-0 right-0 z-50 bg-red-500/90 text-white text-xs text-center py-1 font-body" style=${{paddingTop:'max(4px,var(--safe-top))'}}>Hors ligne — données sauvegardées localement</div>`}

    <!-- PR Flash -->
    ${prFlash && html`<div class="fixed inset-0 z-50 pointer-events-none flex items-center justify-center" style=${{animation:'shake 0.5s ease'}}>
      <div class="absolute inset-0 bg-ki-gold/15" style=${{animation:'flash-gold 1s ease-out forwards'}}/>
      <div class="text-center z-10 px-6">
        <div class="font-display text-4xl sm:text-5xl text-ki-gold mb-3" style=${{textShadow:'0 0 40px rgba(255,215,0,0.6)'}}>POWER UP!</div>
        <div class="font-body text-lg text-white/90">${prFlash}</div>
      </div>
    </div>`}

    <!-- Page content -->
    <div class="page-enter pb-24" key=${tab}>${pages[tab]}</div>

    <!-- Bottom Nav -->
    <${BottomNav} tab=${tab} setTab=${setTab}/>
  </div>`;
}

    {icon:'👤',label:'Capsule',activeColor:'#00BFFF'}

  return html`<nav class="nav-glass fixed bottom-0 left-0 right-0 z-40 gpu" style=${{paddingBottom:'max(6px, var(--safe-bottom))'}}>
    <div class="flex justify-around items-center h-16 max-w-lg mx-auto px-2">
      ${tabs.map((t,i)=>html`<button key=${i} onClick=${()=>setTab(i)} class="touch-btn flex flex-col items-center gap-0.5 flex-1 relative py-2" aria-label=${t.label}>
        <span class="text-xl transition-transform duration-150 ${tab===i?'scale-110':''}">${t.icon}</span>
        <span class="text-[10px] font-body font-medium transition-colors duration-150" style=${{color:tab===i?t.activeColor:'#666'}}>${t.label}</span>

    </div>
  </nav>`;
});

/* =========================================
   PAGE 2: TRAINING
   ========================================= */
function TrainingPage({data,set,firePR}){
  const[view,setView]=useState('main');
  const[selEx,setSelEx]=useState(null);
  const[wSets,setWSets]=useState([]);
  const[rest,setRest]=useState(0);
  const[restT,setRestT]=useState(90);
  const[search,setSearch]=useState('');
  const[fMuscle,setFMuscle]=useState('');
  const[tw,setTw]=useState('');
  const[tr,setTr]=useState('');
  const[flash,setFlash]=useState(-1);
  const timerRef=useRef(null);

  useEffect(()=>{if(rest>0){timerRef.current=setTimeout(()=>setRest(r=>r-1),1000);return()=>clearTimeout(timerRef.current)}},[rest]);

  const startRest=(s)=>{setRestT(s);setRest(s)};

  const filtered=useMemo(()=>{
    let ex=EXERCISES;
    if(fMuscle)ex=ex.filter(e=>e.muscle===fMuscle);
    if(search)ex=ex.filter(e=>e.nameFr.toLowerCase().includes(search.toLowerCase()));
    return ex;
  },[search,fMuscle]);

  const addSet=()=>{
    const w=parseFloat(tw)||0,r=parseInt(tr)||0;
    if(r<=0)return;
    const key=selEx.id,cur=data.prs[key]||0;
    let isPR=false;
    if(w>cur){isPR=true;set(d=>({...d,prs:{...d.prs,[key]:w}}));firePR('NOUVEAU RECORD! '+selEx.nameFr+': '+w+'kg')}
    const ns={exerciseId:selEx.id,weight:w,reps:r,date:today(),isPR};
    setWSets(p=>[...p,ns]);
    setFlash(wSets.length);setTimeout(()=>setFlash(-1),400);
    setTw('');setTr('');startRest(90);
  };

  const finish=()=>{
    if(wSets.length===0)return;
    const t=today(),y=new Date(Date.now()-864e5).toISOString().split('T')[0];
    const wo={date:t,sets:wSets};
    set(d=>{
      const streak=d.profile.lastWorkoutDate===t?d.profile.streak:(d.profile.lastWorkoutDate===y?d.profile.streak+1:1);
      return{...d,workouts:[...d.workouts,wo],profile:{...d.profile,streak,lastWorkoutDate:t}};
    });
    setWSets([]);setView('summary');
  };

  const wVol=wSets.reduce((s,st)=>s+(st.weight||0)*(st.reps||0),0);
  const restPct=restT>0?(restT-rest)/restT*100:0;
  const restCirc=2*Math.PI*40;

  // SUMMARY VIEW
  if(view==='summary'){
    return html`<div class="page-bg-train min-h-screen flex items-center justify-center px-4">
      <div class="card-glass p-8 text-center max-w-sm w-full fade-in">
        <${CharImg} src=${IMG.goku_ssj} alt="Victory" className="w-36 h-36 mx-auto mb-5 float-anim" charKey="goku_ssj"/>
        <div class="font-display text-3xl text-ki-gold mb-2 tracking-wide" style=${{textShadow:'0 0 20px rgba(255,215,0,0.4)'}}>TERMINÉ !</div>
        <div class="font-body text-gray-300 mb-6">Tu as repoussé tes limites, guerrier !</div>
        <div class="grid grid-cols-2 gap-3 mb-6">
          <div class="card-glass p-4"><div class="font-power text-2xl text-ki-gold">${wSets.length}</div><div class="text-xs text-gray-400">Séries</div></div>
          <div class="card-glass p-4"><div class="font-power text-2xl text-ssj-blue">${fmt(Math.round(wVol))}</div><div class="text-xs text-gray-400">Volume (kg)</div></div>
        </div>
        <div class="text-sm text-gray-400 mb-5 font-body">Power Level: <span class="text-ki-gold font-power">+${fmt(Math.floor(wVol+wSets.length*10+100))}</span></div>
        <button onClick=${()=>setView('main')} class="ki-btn py-3 px-8 rounded-xl font-display text-black text-lg w-full">RETOUR</button>
      </div>
    </div>`;
  }

  // WORKOUT VIEW
  if(view==='workout'&&selEx){
    const exSets=wSets.filter(s=>s.exerciseId===selEx.id);
    const hist=data.workouts.flatMap(w=>w.sets).filter(s=>s.exerciseId===selEx.id).slice(-8);
    return html`<div class="page-bg-train min-h-screen" style=${{paddingTop:'max(12px, calc(var(--safe-top) + 8px))'}}>
      <div class="px-4 max-w-lg mx-auto">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-4">
          <button onClick=${()=>{setSelEx(null);setView('exercises')}} class="touch-btn w-11 h-11 rounded-xl bg-white/5 text-gray-300 text-lg">←</button>
          <div class="flex-1 min-w-0">
            <div class="font-display text-xl text-white truncate">${selEx.nameFr}</div>
            <div class="text-xs text-gray-400 font-body">${selEx.muscle} · ${selEx.equipment}</div>
          </div>
          ${data.prs[selEx.id]?html`<div class="card-glass px-2.5 py-1.5"><div class="text-[9px] text-gray-400">PR</div><div class="font-power text-sm text-ki-gold">${data.prs[selEx.id]}kg</div></div>`:null}
        </div>

        <!-- Circular Rest Timer -->
        ${rest>0 && html`<div class="card-glass p-4 mb-4 flex items-center gap-4">
          <svg width="70" height="70" viewBox="0 0 90 90" class="shrink-0 -rotate-90">
            <circle cx="45" cy="45" r="40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
            <circle cx="45" cy="45" r="40" fill="none" stroke="url(#timerGrad)" stroke-width="5" stroke-linecap="round"
              stroke-dasharray=${restCirc} stroke-dashoffset=${restCirc*(1-restPct/100)} style=${{transition:'stroke-dashoffset 1s linear'}}/>
            <defs><linearGradient id="timerGrad"><stop offset="0%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs>
          </svg>
          <div>
            <div class="font-power text-2xl text-ki-gold">${rest}s</div>
            <div class="text-xs text-gray-400 font-body">Charge de Ki en cours...</div>
          </div>
          <button onClick=${()=>setRest(0)} class="touch-btn ml-auto bg-white/5 rounded-lg px-3 py-2 text-xs text-gray-300 font-body">Skip</button>
        </div>`}

        <!-- Input -->
        <div class="card-glass p-4 mb-4">
          <div class="flex gap-3 items-end">
            <div class="flex-1">
              <label class="text-[10px] text-gray-400 block mb-1.5 font-body">Poids (kg)</label>
              <input type="number" inputmode="decimal" value=${tw} onInput=${e=>setTw(e.target.value)} placeholder="0"
                class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-3.5 text-center font-power text-xl text-white focus:border-ki-gold/60 focus:outline-none focus:ring-1 focus:ring-ki-gold/30 transition-all" style=${{minHeight:'52px'}}/>
            </div>
            <div class="flex-1">
              <label class="text-[10px] text-gray-400 block mb-1.5 font-body">Reps</label>
              <input type="number" inputmode="numeric" value=${tr} onInput=${e=>setTr(e.target.value)} placeholder="0"
                class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-3.5 text-center font-power text-xl text-white focus:border-ki-gold/60 focus:outline-none focus:ring-1 focus:ring-ki-gold/30 transition-all" style=${{minHeight:'52px'}}/>
            </div>
            <button onClick=${addSet} class="touch-btn bg-green-500 hover:bg-green-400 w-14 h-14 rounded-xl text-2xl text-white font-bold transition-colors" style=${{minHeight:'52px'}}>✓</button>
          </div>
        </div>

        <!-- Current Sets -->
        ${exSets.length>0 && html`<div class="card-glass p-4 mb-4">
          <div class="text-[10px] text-gray-400 mb-2 font-body uppercase tracking-wider">Séries aujourd'hui</div>
          ${exSets.map((s,i)=>html`<div key=${i} class="flex items-center justify-between py-2.5 border-b border-white/5 last:border-0 rounded transition-colors duration-300 ${flash===i?'bg-green-500/15':''}">
            <span class="text-sm text-gray-300 font-body">Série ${i+1}</span>
            <div class="flex items-center gap-2">
              <span class="font-power text-sm ${s.isPR?'text-ki-gold':'text-white'}">${s.weight}kg × ${s.reps}</span>
              ${s.isPR && html`<span class="text-ki-gold text-sm">⭐</span>`}
            </div>
          </div>`)}
        </div>`}

        <!-- Rest quick buttons -->
        <div class="flex gap-2 mb-4">
          ${[60,90,120,180].map(s=>html`<button key=${s} onClick=${()=>startRest(s)} class="touch-btn flex-1 py-2.5 rounded-xl bg-white/5 text-xs text-gray-300 font-body border border-white/5 active:bg-white/10 transition-all">${s}s</button>`)}
        </div>

        <!-- History -->
        ${hist.length>0 && html`<div class="card-glass p-4 mb-4">
          <div class="text-[10px] text-gray-400 mb-2 font-body uppercase tracking-wider">Historique</div>
          ${hist.slice(-5).reverse().map((s,i)=>html`<div key=${i} class="flex justify-between py-1.5 text-xs">
            <span class="text-gray-500 font-body">${s.date}</span>
            <span class="text-gray-300 font-power">${s.weight}kg × ${s.reps}</span>
          </div>`)}
        </div>`}

        <!-- Actions -->
        <div class="flex gap-3 mb-4">
          <button onClick=${()=>{setSelEx(null);setView('exercises')}} class="touch-btn flex-1 py-3.5 rounded-xl bg-white/5 border border-white/10 font-body text-white text-sm">+ Exercice</button>
          <button onClick=${finish} class="ki-btn flex-1 py-3.5 rounded-xl font-display text-black text-sm tracking-wider">TERMINER</button>
        </div>

        <!-- Summary bar -->
        ${wSets.length>0 && html`<div class="card-glass p-3 flex items-center justify-between">
          <span class="text-xs text-gray-400 font-body">Total: <span class="text-white font-power">${wSets.length} séries</span></span>
          <span class="text-xs text-gray-400 font-body">Volume: <span class="text-ki-gold font-power">${fmt(Math.round(wVol))} kg</span></span>
        </div>`}
      </div>
    </div>`;
  }

  // EXERCISE LIST
  if(view==='exercises'){
    return html`<div class="page-bg-train min-h-screen" style=${{paddingTop:'max(12px, calc(var(--safe-top) + 8px))'}}>
      <div class="px-4 max-w-lg mx-auto">
        <div class="flex items-center gap-3 mb-4">
          <button onClick=${()=>setView('main')} class="touch-btn w-11 h-11 rounded-xl bg-white/5 text-gray-300 text-lg">←</button>
          <div class="font-display text-xl text-white">Exercices <span class="text-gray-500 text-base">(${EXERCISES.length})</span></div>
        </div>
        <input type="text" placeholder="Rechercher un exercice..." value=${search} onInput=${e=>setSearch(e.target.value)}
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 text-white font-body mb-3 focus:border-ki-gold/60 focus:outline-none transition-all" style=${{minHeight:'48px'}}/>
        <div class="flex gap-2 overflow-x-auto hide-scroll mb-4 pb-1 scroll-snap">
          <button onClick=${()=>setFMuscle('')} class="touch-btn shrink-0 px-4 py-2 rounded-full text-xs font-body font-medium transition-all ${!fMuscle?'bg-ki-gold text-black':'bg-white/5 text-gray-300 border border-white/5'}">Tout</button>
          ${MUSCLES_ALL.map(m=>html`<button key=${m} onClick=${()=>setFMuscle(f=>f===m?'':m)} class="touch-btn shrink-0 px-4 py-2 rounded-full text-xs font-body font-medium transition-all ${fMuscle===m?'bg-ki-gold text-black':'bg-white/5 text-gray-300 border border-white/5'}">${m}</button>`)}
        </div>
        <div class="space-y-2 smooth-scroll" style=${{maxHeight:'calc(100vh - 200px)',overflowY:'auto'}}>
          ${filtered.map(ex=>html`<button key=${ex.id} onClick=${()=>{setSelEx(ex);setView('workout')}} class="w-full card-glass p-3.5 flex items-center justify-between touch-btn rounded-2xl">
            <div class="text-left min-w-0 flex-1">
              <div class="font-body text-sm text-white font-medium">${ex.nameFr}</div>
              <div class="text-[10px] text-gray-400 mt-0.5">${ex.muscle} · ${ex.equipment}</div>
            </div>
            <div class="flex gap-1 ml-3 shrink-0">
              ${[1,2,3].map(d=>html`<div key=${d} class="w-2 h-2 rounded-full transition-colors" style=${{background:d<=ex.difficulty?'#FFD700':'rgba(255,255,255,0.08)'}}/>`)}
            </div>
          </button>`)}
        </div>
      </div>
    </div>`;
  }

  // MAIN TRAINING VIEW
  return html`<div class="page-bg-train min-h-screen" style=${{paddingTop:'max(12px, calc(var(--safe-top) + 8px))'}}>
    <div class="px-4 max-w-lg mx-auto">
      <div class="font-display text-2xl text-white mb-5 fade-in tracking-wide">Salle de l'Esprit et du Temps</div>

      <div class="mb-5 fade-in fade-1">

          ${SAGAS.map(s=>html`<div key=${s.id} class="shrink-0 w-48 card-glass p-4 relative overflow-hidden" style=${{borderColor:s.color+'20'}}>

      </button>

      <!-- Active workout -->
      ${wSets.length>0 && html`<div class="card-glass card-glow p-4 mb-4 fade-in">

          <div>
            <div class="font-body font-semibold text-white text-sm">Workout en cours</div>

          </div>`;
        })}

}

/* =========================================
   PAGE 3: STATS
   ========================================= */
function StatsPage({data,pl,tf}){
  const totalVol=data.workouts.reduce((s,w)=>s+w.sets.reduce((a,st)=>a+(st.weight||0)*(st.reps||0),0),0);
  const ww=useMemo(()=>{const ws=weekStart();return data.workouts.filter(w=>w.date>=ws)},[data.workouts]);
  const wVol=ww.reduce((s,w)=>s+w.sets.reduce((a,st)=>a+(st.weight||0)*(st.reps||0),0),0);

  const muscleVol=useMemo(()=>{
    const mv={};
    data.workouts.forEach(w=>w.sets.forEach(s=>{const ex=EXERCISES.find(e=>e.id===s.exerciseId);if(ex)mv[ex.muscle]=(mv[ex.muscle]||0)+(s.weight||0)*(s.reps||0)}));
    return mv;
  },[data.workouts]);
  const maxMV=Math.max(...Object.values(muscleVol),1);

  const chartData=useMemo(()=>data.workouts.slice(-12).map((w,i)=>({name:'S'+(i+1),vol:Math.round(w.sets.reduce((a,st)=>a+(st.weight||0)*(st.reps||0),0))})),[data.workouts]);

  const prList=Object.entries(data.prs).map(([id,w])=>{const ex=EXERCISES.find(e=>e.id===id);return{name:ex?ex.nameFr:id,weight:w,muscle:ex?ex.muscle:''}}).sort((a,b)=>b.weight-a.weight);

  const scoCirc=2*Math.PI*52;

  return html`<div class="page-bg-stats min-h-screen" style=${{paddingTop:'max(12px, calc(var(--safe-top) + 8px))'}}>
    <div class="px-4 max-w-lg mx-auto">
      <div class="font-display text-2xl text-white mb-5 fade-in tracking-wide">Scouter</div>

      <!-- Scouter Circle -->
      <div class="card-glass p-6 mb-4 flex flex-col items-center fade-in fade-1">
        <div class="relative w-44 h-44 flex items-center justify-center mb-3">
          <svg width="180" height="180" viewBox="0 0 120 120" class="absolute inset-0 scouter-ring">
            <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(0,255,136,0.08)" stroke-width="3"/>
            <circle cx="60" cy="60" r="52" fill="none" stroke="#00FF88" stroke-width="3" stroke-linecap="round"
              stroke-dasharray=${scoCirc} stroke-dashoffset=${scoCirc*0.15} transform="rotate(-90 60 60)" opacity="0.6"/>
            <circle cx="60" cy="60" r="46" fill="none" stroke="rgba(0,255,136,0.04)" stroke-width="1"/>
          </svg>
          <div class="text-center z-10">
            <div class="text-[9px] text-scouter font-body uppercase tracking-[3px] mb-1">Power Level</div>
            <${PowerCounter} value=${pl} className="font-power text-3xl text-scouter"/>
          </div>
        </div>
        <div class="font-display text-sm tracking-wide" style=${{color:tf.color}}>${tf.name}</div>
        <div class="flex items-center gap-2 mt-2">
          <${CharImg} src=${IMG[tf.imgKey]} alt="" className="w-8 h-8" charKey=${tf.imgKey}/>
          <div class="text-[10px] text-gray-500 font-body">
            Vol: ${fmt(Math.round(totalVol))} + Streak: ${(data.profile.streak||0)*50} + PRs: ${Object.keys(data.prs).length*200} + Séances: ${data.workouts.length*100}
          </div>
        </div>
      </div>

      <!-- Chart -->
      ${chartData.length>1 && html`<div class="card-glass p-4 mb-4 fade-in fade-2">
        <div class="text-[10px] text-gray-400 font-body mb-3 uppercase tracking-wider">Progression du volume</div>
        <div style=${{width:'100%',height:'180px'}}>
          <${Recharts.ResponsiveContainer} width="100%" height="100%">
            <${Recharts.AreaChart} data=${chartData}>
              <${Recharts.defs}><${Recharts.linearGradient} id="vG" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%" stopColor="#FFD700" stopOpacity=${0.25}/><stop offset="95%" stopColor="#FFD700" stopOpacity=${0}/>
              <//><//>
              <${Recharts.XAxis} dataKey="name" tick=${{fill:'#555',fontSize:10}} axisLine=${false} tickLine=${false}/>
              <${Recharts.YAxis} tick=${{fill:'#555',fontSize:10}} axisLine=${false} tickLine=${false} width=${35}/>
              <${Recharts.Tooltip} contentStyle=${{background:'#12121a',border:'1px solid rgba(255,215,0,0.2)',borderRadius:'8px',fontSize:'12px'}} labelStyle=${{color:'#888'}}/>
              <${Recharts.Area} type="monotone" dataKey="vol" stroke="#FFD700" fill="url(#vG)" strokeWidth=${2}/>
            <//>
          <//>
        </div>
      </div>`}

      <!-- Heatmap -->
      <div class="card-glass p-4 mb-4 fade-in fade-3">
        <div class="text-[10px] text-gray-400 font-body mb-3 uppercase tracking-wider">Heatmap musculaire</div>
        <div class="grid grid-cols-4 gap-2">
          ${MUSCLES_ALL.filter(m=>m!=='Cardio').map(m=>{
            const r=muscleVol[m]?muscleVol[m]/maxMV:0;
            const bg=r===0?'rgba(255,255,255,0.03)':r<0.25?'rgba(50,205,50,0.15)':r<0.5?'rgba(255,215,0,0.15)':r<0.75?'rgba(255,140,0,0.2)':'rgba(255,69,0,0.2)';
            const tc=r===0?'#555':r<0.25?'#32CD32':r<0.5?'#FFD700':r<0.75?'#FF8C00':'#FF4500';
            return html`<div key=${m} class="text-center p-2.5 rounded-xl transition-all" style=${{background:bg}}>
              <div class="text-[10px] font-body font-medium" style=${{color:tc}}>${m}</div>
              <div class="text-[10px] font-power mt-0.5" style=${{color:tc}}>${muscleVol[m]?fmt(Math.round(muscleVol[m])):'—'}</div>
            </div>`;
          })}

      </div>

      <!-- PRs -->
      <div class="card-glass p-4 mb-4 fade-in fade-4">
        <div class="text-[10px] text-gray-400 font-body mb-3 uppercase tracking-wider">Records Personnels</div>
        ${prList.length===0?html`<div class="text-center py-6">
          <${CharImg} src=${IMG.dragonballs} alt="DB" className="w-16 h-16 mx-auto mb-2 opacity-20" charKey="dragonballs"/>
          <div class="text-sm text-gray-500 font-body">Bats ton premier record !</div>
        </div>`:prList.map((pr,i)=>html`<div key=${i} class="flex items-center justify-between py-2.5 border-b border-white/5 last:border-0">
          <div class="flex items-center gap-2.5">
            <div class="w-7 h-7 rounded-full bg-ki-gold/10 flex items-center justify-center text-xs">🐉</div>
            <div><div class="text-sm text-white font-body">${pr.name}</div><div class="text-[10px] text-gray-400">${pr.muscle}</div></div>
          </div>
          <span class="font-power text-sm text-ki-gold">${pr.weight} kg</span>
        </div>`)}
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 gap-3 mb-4 fade-in fade-5">
        ${[{v:fmt(Math.round(wVol)),l:'Vol. semaine',c:'#FFD700'},{v:ww.length+'/7',l:'Fréquence',c:'#00BFFF'},{v:data.workouts.length,l:'Total séances',c:'#32CD32'},{v:data.profile.streak,l:'Streak jours',c:'#FF4C6A'}].map((s,i)=>html`<div key=${i} class="card-glass p-3.5 text-center">
          <div class="font-power text-xl" style=${{color:s.c}}>${s.v}</div>
          <div class="text-[10px] text-gray-400 font-body mt-0.5">${s.l}</div>
        </div>`)}
      </div>
    </div>
  </div>`;
}

/* =========================================
   PAGE 4: NUTRITION
   ========================================= */
function NutritionPage({data,set}){
  const t=today();
  const log=data.nutrition[t]||[];
  const[search,setSearch]=useState('');
  const[showSearch,setShowSearch]=useState(false);
  const[grams,setGrams]=useState('100');
  const[selFood,setSelFood]=useState(null);
  const water=data.waterLog[t]||0;

  const totals=useMemo(()=>log.reduce((a,i)=>({cal:a.cal+i.cal,p:a.p+i.p,c:a.c+i.c,f:a.f+i.f}),{cal:0,p:0,c:0,f:0}),[log]);

  const addFood=f=>{
    const g=parseFloat(grams)||100,r=g/100;
    const entry={name:f.name,grams:g,cal:Math.round(f.cal*r),p:+(f.p*r).toFixed(1),c:+(f.c*r).toFixed(1),f:+(f.f*r).toFixed(1)};
    set(d=>({...d,nutrition:{...d.nutrition,[t]:[...(d.nutrition[t]||[]),entry]}}));
    setShowSearch(false);setSelFood(null);setSearch('');setGrams('100');
  };

  const addWater=()=>set(d=>({...d,waterLog:{...d.waterLog,[t]:(d.waterLog[t]||0)+1}}));

  const calPct=Math.min(100,totals.cal/data.profile.calGoal*100);
  const calClr=calPct<75?'#32CD32':calPct<95?'#FFD700':'#FF4500';
  const macros=[
    {label:'Protéines',val:totals.p,tgt:data.profile.pTarget,color:'#00BFFF'},
    {label:'Glucides',val:totals.c,tgt:data.profile.cTarget,color:'#FFD700'},
    {label:'Lipides',val:totals.f,tgt:data.profile.fTarget,color:'#FF4C6A'}
  ];

  const filtered=search?FOODS.filter(f=>f.name.toLowerCase().includes(search.toLowerCase())).slice(0,25):FOODS.slice(0,25);

  const PLANS=[
    {name:'Plan Goku',desc:'Bulk 3500 kcal',cal:3500,imgKey:'goku_base',color:'#FFD700'},
    {name:'Plan Vegeta',desc:'Lean 2800 kcal',cal:2800,imgKey:'vegeta',color:'#00BFFF'},
    {name:'Plan Trunks',desc:'Maintenance 2200 kcal',cal:2200,imgKey:'trunks',color:'#9B59B6'},
    {name:'Plan Krillin',desc:'Cut 1800 kcal',cal:1800,imgKey:'krillin',color:'#FF4C6A'}
  ];

  const circR=22,circC=2*Math.PI*circR;

  if(showSearch){
    return html`<div class="page-bg-nutri min-h-screen" style=${{paddingTop:'max(12px, calc(var(--safe-top) + 8px))'}}>
      <div class="px-4 max-w-lg mx-auto">
        <div class="flex items-center gap-3 mb-4">
          <button onClick=${()=>{setShowSearch(false);setSelFood(null)}} class="touch-btn w-11 h-11 rounded-xl bg-white/5 text-gray-300 text-lg">←</button>
          <div class="font-display text-xl text-white">Ajouter un aliment</div>
        </div>
        ${selFood && html`<div class="card-glass p-4 mb-4">
          <div class="font-body font-semibold text-white mb-3">${selFood.name}</div>
          <div class="flex items-end gap-3 mb-3">
            <div class="flex-1">
              <label class="text-[10px] text-gray-400 block mb-1.5">Quantité (g)</label>
              <input type="number" inputmode="numeric" value=${grams} onInput=${e=>setGrams(e.target.value)} class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-3 text-center font-power text-lg text-white focus:border-senzu/60 focus:outline-none transition-all" style=${{minHeight:'48px'}}/>
            </div>
            <button onClick=${()=>addFood(selFood)} class="ki-btn px-6 py-3 rounded-xl font-display text-black" style=${{minHeight:'48px'}}>AJOUTER</button>
          </div>
          <div class="grid grid-cols-4 gap-2 text-center text-xs">
            ${[{l:'kcal',v:Math.round(selFood.cal*(parseFloat(grams)||100)/100),c:'#fff'},{l:'Prot',v:(selFood.p*(parseFloat(grams)||100)/100).toFixed(1),c:'#00BFFF'},{l:'Gluc',v:(selFood.c*(parseFloat(grams)||100)/100).toFixed(1),c:'#FFD700'},{l:'Lip',v:(selFood.f*(parseFloat(grams)||100)/100).toFixed(1),c:'#FF4C6A'}].map((m,i)=>html`<div key=${i}><span class="font-power" style=${{color:m.c}}>${m.v}</span><br/><span class="text-gray-400">${m.l}</span></div>`)}
          </div>
        </div>`}
        <input type="text" placeholder="Rechercher un aliment... (${FOODS.length} disponibles)" value=${search} onInput=${e=>setSearch(e.target.value)} class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 text-white font-body mb-3 focus:border-senzu/60 focus:outline-none transition-all" style=${{minHeight:'48px'}} autoFocus/>
        <div class="space-y-1.5 smooth-scroll" style=${{maxHeight:'calc(100vh - 280px)',overflowY:'auto'}}>
          ${filtered.map((f,i)=>html`<button key=${i} onClick=${()=>setSelFood(f)} class="w-full card-glass p-3.5 flex items-center justify-between touch-btn rounded-2xl ${selFood===f?'border-senzu/40':''}">
            <div class="text-left min-w-0 flex-1">
              <div class="font-body text-sm text-white">${f.name}</div>
              <div class="text-[10px] text-gray-400 mt-0.5">P:${f.p}g · G:${f.c}g · L:${f.f}g /100g</div>
            </div>
            <span class="font-power text-xs text-ki-gold ml-2">${f.cal} kcal</span>
          </button>`)}
        </div>
      </div>
    </div>`;
  }

  return html`<div class="page-bg-nutri min-h-screen" style=${{paddingTop:'max(12px, calc(var(--safe-top) + 8px))'}}>
    <div class="px-4 max-w-lg mx-auto">
      <div class="font-display text-2xl text-white mb-5 fade-in tracking-wide">Senzu Bean Counter</div>

      <!-- Cal HP Bar -->
      <div class="card-glass p-4 mb-4 fade-in fade-1">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs text-gray-400 font-body">Calories</span>
          <span class="font-power text-sm" style=${{color:calClr}}>${totals.cal} / ${data.profile.calGoal}</span>
        </div>
        <div class="h-4 bg-white/6 rounded-full overflow-hidden">
          <div class="h-full rounded-full transition-all duration-700 ease-out" style=${{width:calPct+'%',background:'linear-gradient(90deg,'+calClr+','+calClr+'cc)'}}/>
        </div>
      </div>

      <!-- Macro Circles -->
      <div class="grid grid-cols-3 gap-3 mb-4 fade-in fade-2">
        ${macros.map((m,i)=>{
          const pct=Math.min(100,m.val/m.tgt*100);
          return html`<div key=${i} class="card-glass p-3.5 flex flex-col items-center">
            <svg width="58" height="58" viewBox="0 0 56 56">
              <circle cx="28" cy="28" r=${circR} fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>
              <circle cx="28" cy="28" r=${circR} fill="none" stroke=${m.color} stroke-width="4" stroke-linecap="round"

            </svg>
            <div class="text-[10px] text-gray-400 mt-1.5 font-body">${m.label}</div>
            <div class="text-[10px] font-power" style=${{color:m.color}}>${Math.round(m.val)}/${m.tgt}g</div>
          </div>`;
        })}
      </div>

      <!-- Add food -->
      <button onClick=${()=>setShowSearch(true)} class="ki-btn w-full py-3.5 rounded-xl font-display text-black mb-4 fade-in fade-3 tracking-wider">+ AJOUTER UN ALIMENT</button>

      <!-- Today log -->
      ${log.length>0 && html`<div class="card-glass p-4 mb-4 fade-in fade-4">
        <div class="text-[10px] text-gray-400 font-body mb-2 uppercase tracking-wider">Aujourd'hui</div>
        ${log.map((item,i)=>html`<div key=${i} class="flex items-center justify-between py-2.5 border-b border-white/5 last:border-0">
          <div><div class="text-sm text-white font-body">${item.name}</div><div class="text-[10px] text-gray-400">${item.grams}g</div></div>
          <div class="text-right"><div class="font-power text-xs text-ki-gold">${item.cal} kcal</div><div class="text-[10px] text-gray-400">P:${item.p} G:${item.c} L:${item.f}</div></div>
        </div>`)}
      </div>`}

      <!-- Water -->
      <div class="card-glass p-4 mb-4 fade-in fade-5">
        <div class="flex items-center justify-between mb-3">
          <span class="text-sm text-white font-body font-medium">Eau</span>
          <span class="text-xs text-gray-400 font-body">${water}/8 verres</span>
        </div>
        <div class="flex gap-2 items-center">
          <div class="flex gap-2 flex-1 flex-wrap">
            ${[0,1,2,3,4,5,6,7].map(i=>html`<div key=${i} class="w-8 h-8 rounded-full flex items-center justify-center text-base transition-all duration-300" style=${{background:i<water?'rgba(50,205,50,0.15)':'rgba(255,255,255,0.03)',boxShadow:i<water?'0 0 8px rgba(50,205,50,0.2)':'none'}}>${i<water?'🫘':'💧'}</div>`)}
          </div>
          <button onClick=${addWater} class="touch-btn bg-senzu/15 border border-senzu/25 text-senzu px-4 py-2.5 rounded-xl text-xs font-body font-semibold">+1</button>
        </div>
      </div>

      <!-- Meal Plans -->
      <div class="fade-in fade-6">
        <div class="text-[10px] text-gray-400 font-body mb-3 uppercase tracking-wider">Plans nutritionnels</div>
        <div class="grid grid-cols-2 gap-3">
          ${PLANS.map((mp,i)=>html`<div key=${i} class="card-glass p-3.5 relative overflow-hidden">
            <div class="absolute -right-2 -bottom-2 w-16 h-16 opacity-15">
              <${CharImg} src=${IMG[mp.imgKey]} alt=${mp.name} className="w-full h-full" charKey=${mp.imgKey}/>

            </div>
          </div>`)}
        </div>
      </div>
    </div>
  </div>`;
}

        </div>`:html`<button onClick=${()=>setEditName(true)} class="touch-btn font-display text-2xl text-white tracking-wide">${data.profile.name} <span class="text-gray-500 text-base">✏️</span></button>`}
        <div class="font-power text-sm text-ki-gold mt-2">PL: ${fmt(pl)}</div>
        <div class="text-xs font-body mt-1" style=${{color:tf.color}}>${tf.name}</div>
      </div>

      <!-- Avatar Selection -->
      <div class="card-glass p-4 mb-4 fade-in fade-2">
        <div class="text-[10px] text-gray-400 font-body mb-3 uppercase tracking-wider">Choisis ton avatar</div>
        <div class="grid grid-cols-5 gap-3">
          ${avatars.map(a=>html`<button key=${a} onClick=${()=>set(d=>({...d,profile:{...d.profile,avatar:a}}))} class="touch-btn w-full aspect-square rounded-full flex items-center justify-center transition-all ${data.profile.avatar===a?'ring-2 ring-ki-gold bg-white/10 scale-105':'bg-white/5'}">
            <${CharImg} src=${IMG[a]} alt=${a} className="w-12 h-12" charKey=${a}/>
          </button>`)}
        </div>
      </div>

      <!-- Transformation Timeline -->
      <div class="card-glass p-4 mb-4 fade-in fade-3">
        <div class="text-[10px] text-gray-400 font-body mb-3 uppercase tracking-wider">Niveaux de transformation</div>
        <div class="space-y-3">
          ${levels.map((lv,i)=>html`<div key=${i} class="flex items-center gap-3 transition-opacity ${pl>=lv.pl?'opacity-100':'opacity-25'}">
            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center shrink-0 overflow-hidden">
              <${CharImg} src=${IMG[lv.imgKey]} alt=${lv.name} className="w-10 h-10" charKey=${lv.imgKey}/>
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-body text-sm font-medium truncate" style=${{color:pl>=lv.pl?lv.color:'#555'}}>${lv.name}</div>
              <div class="text-[10px] text-gray-500 font-body">PL ${fmt(lv.pl)}+</div>
            </div>
            ${pl>=lv.pl?html`<span class="text-senzu text-base">✓</span>`:html`<span class="text-gray-600">🔒</span>`}
          </div>`)}
        </div>
      </div>

      <!-- Settings -->
      <div class="card-glass p-4 mb-4 fade-in fade-4">
        <div class="text-[10px] text-gray-400 font-body mb-3 uppercase tracking-wider">Paramètres</div>
        <div class="space-y-4">
          ${[
            {label:'Objectif calories',key:'calGoal',step:100,min:1200,color:'#FFD700'},
            {label:'Protéines (g)',key:'pTarget',step:10,min:50,color:'#00BFFF'},
            {label:'Glucides (g)',key:'cTarget',step:10,min:50,color:'#FFD700'},
            {label:'Lipides (g)',key:'fTarget',step:5,min:20,color:'#FF4C6A'}
          ].map(s=>html`<div key=${s.key} class="flex items-center justify-between">
            <span class="text-sm text-white font-body">${s.label}</span>
            <div class="flex items-center gap-2">
              <button onClick=${()=>set(d=>({...d,profile:{...d.profile,[s.key]:Math.max(s.min,d.profile[s.key]-s.step)}}))} class="touch-btn w-9 h-9 rounded-lg bg-white/5 text-white text-sm">−</button>
              <span class="font-power text-sm w-14 text-center" style=${{color:s.color}}>${data.profile[s.key]}</span>
              <button onClick=${()=>set(d=>({...d,profile:{...d.profile,[s.key]:d.profile[s.key]+s.step}}))} class="touch-btn w-9 h-9 rounded-lg bg-white/5 text-white text-sm">+</button>
            </div>
          </div>`)}
        </div>
      </div>

      <!-- Badges -->
      <div class="card-glass p-4 mb-4 fade-in fade-5">
        <div class="text-[10px] text-gray-400 font-body mb-3 uppercase tracking-wider">Badges & Réussites</div>
        <div class="grid grid-cols-3 gap-2.5">
          ${badges.map((b,i)=>html`<div key=${i} class="text-center p-2.5 rounded-xl transition-all ${b.unlocked?'bg-ki-gold/10 border border-ki-gold/15':'bg-white/3'}">
            <div class="text-2xl mb-1 ${b.unlocked?'':'opacity-20'}">${b.icon}</div>
            <div class="text-[10px] font-body ${b.unlocked?'text-ki-gold':'text-gray-600'}">${b.label}</div>
          </div>`)}
        </div>
      </div>

      <!-- Reset + Footer -->
      <button onClick=${()=>{if(confirm('Réinitialiser toutes les données ? Cette action est irréversible.')){localStorage.removeItem('sf3_data');location.reload()}}} class="w-full py-3.5 rounded-xl bg-red-500/8 border border-red-500/15 text-red-400 text-sm font-body mb-6 touch-btn">Réinitialiser les données</button>

      <div class="text-center py-6">
        <${Logo} size=${28}/>
        <div class="text-gray-500 text-xs font-body mt-2">Propulsé par <span class="text-ki-gold font-semibold">Katrava</span></div>
        <div class="text-gray-600 text-[10px] font-body mt-1">v3.0 · ${EXERCISES.length} exercices · ${FOODS.length} aliments</div>
      </div>
    </div>
  </div>`;
}

/* =========================================
   RENDER
   ========================================= */
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

/* Auto-scroll inputs into view on mobile */
document.addEventListener('focusin',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'){
    setTimeout(()=>{e.target.scrollIntoView({behavior:'smooth',block:'center'})},300);
  }
});
</script>
</body>
</html>
