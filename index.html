*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}

.tab-item.active{color:var(--ki-gold)}

@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes prBurst{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:0.8}100%{transform:scale(1);opacity:1}}
.animate-fadeIn{animation:fadeIn 0.35s ease-out both}
.animate-slideUp{animation:slideUp 0.4s ease-out both}
.animate-scaleIn{animation:scaleIn 0.3s ease-out both}

.muscle-recovering{color:#FFD700}
.muscle-fatigued{color:#FF4C6A}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-content{background:#12121a;border:1px solid rgba(255,255,255,0.08);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px;padding-bottom:calc(24px + var(--safe-bottom));animation:slideUp 0.3s ease-out}
.modal-center{align-items:center}

.chip{display:inline-flex;align-items:center;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);transition:all 0.2s;min-height:40px}
.chip.active{background:rgba(255,215,0,0.15);border-color:rgba(255,215,0,0.4);color:#FFD700}

function getTransformation(pl){
  let t=TRANSFORMATIONS[0];
  for(const tr of TRANSFORMATIONS){if(pl>=tr.minPL)t=tr}
  return t;
}

function calcPowerLevel(profile){
  const workouts=store.get('workouts',[]);
  const streak=calcStreak(workouts);
  let pl=0;
  // Base from total volume
  workouts.forEach(w=>{
    w.exercises?.forEach(ex=>{
      ex.sets?.forEach(s=>{
        if(s.weight&&s.reps) pl+=Math.floor(s.weight*s.reps*0.1);
      });
    });
  });
  // Streak bonus
  pl+=streak*100;
  // Workout count bonus
  pl+=workouts.length*50;
  return Math.floor(pl);
}

function calcStreak(workouts){
  if(!workouts||!workouts.length)return 0;
  const sorted=[...workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let streak=0;
  const today=new Date();today.setHours(0,0,0,0);
  let checkDate=new Date(today);

  for(let i=0;i<60;i++){
    const ds=checkDate.toISOString().split('T')[0];
    const hasWorkout=sorted.some(w=>w.date===ds);
    if(hasWorkout){streak++;checkDate.setDate(checkDate.getDate()-1)}
    else if(i===0){checkDate.setDate(checkDate.getDate()-1)}
    else break;
  }
  return streak;
}

// HELPER FUNCTIONS
// ============================================================
function calcE1RM(weight,reps){
  if(!weight||!reps||reps<=0)return 0;
  if(reps===1)return weight;
  return Math.round(weight*(1+reps/30));
}

function calcBMR(sex,weight,height,age){
  if(sex==='male') return 10*weight+6.25*height-5*age+5;
  return 10*weight+6.25*height-5*age-161;
}

function calcTDEE(bmr,activity){
  const multipliers={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};
  return Math.round(bmr*(multipliers[activity]||1.55));
}

function adjustForGoal(tdee,goal){
  if(goal==='cut')return tdee-500;
  if(goal==='bulk')return tdee+300;
  return tdee;
}

function calcProteinTarget(weight,goal){
  if(goal==='cut')return Math.round(weight*2.2);
  if(goal==='bulk')return Math.round(weight*2);
  return Math.round(weight*1.8);
}

function getToday(){return new Date().toISOString().split('T')[0]}

function formatDate(d){
  const date=new Date(d);
  return date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

function getMuscleRecovery(muscleGroup){
  const workouts=store.get('workouts',[]);
  const now=Date.now();
  let lastTrained=null;
  let totalSets=0;

  for(const w of workouts){
    const wDate=new Date(w.date).getTime();
    const allExercises=getAllExercises();
    let found=false;
    w.exercises?.forEach(ex=>{
      const exData=allExercises.find(e=>e.id===ex.exerciseId);
      if(exData&&(exData.primaryMuscles.includes(muscleGroup)||exData.secondaryMuscles.includes(muscleGroup))){
        found=true;
        totalSets+=(ex.sets?.length||0);
      }
    });
    if(found&&(!lastTrained||wDate>lastTrained))lastTrained=wDate;
  }

  if(!lastTrained)return{status:'fresh',label:'Frais',hours:999};
  const hours=(now-lastTrained)/(1000*60*60);
  if(hours<24)return{status:'fatigued',label:'Fatigué',hours:Math.round(hours)};
  if(hours<48)return{status:'recovering',label:'Récupération',hours:Math.round(hours)};
  return{status:'fresh',label:'Frais',hours:Math.round(hours)};
}

function getLastWorkoutForExercise(exerciseId){
  const workouts=store.get('workouts',[]);
  const sorted=[...workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  for(const w of sorted){
    const ex=w.exercises?.find(e=>e.exerciseId===exerciseId);
    if(ex&&ex.sets?.length)return ex;
  }
  return null;
}

function getPRsForExercise(exerciseId){
  const workouts=store.get('workouts',[]);
  let maxWeight=0,bestSet=0,bestVolume=0,bestE1RM=0;
  let maxWeightData=null,bestSetData=null,bestVolumeData=null,bestE1RMData=null;

  workouts.forEach(w=>{
    w.exercises?.forEach(ex=>{
      if(ex.exerciseId!==exerciseId)return;
      let vol=0;
      ex.sets?.forEach(s=>{
        const w2=s.weight||0,r=s.reps||0;
        if(w2>maxWeight){maxWeight=w2;maxWeightData={weight:w2,reps:r,date:w.date}}
        const setScore=w2*r;
        if(setScore>bestSet){bestSet=setScore;bestSetData={weight:w2,reps:r,date:w.date}}
        vol+=w2*r;
        const e1rm=calcE1RM(w2,r);
        if(e1rm>bestE1RM){bestE1RM=e1rm;bestE1RMData={weight:w2,reps:r,e1rm,date:w.date}}
      });
      if(vol>bestVolume){bestVolume=vol;bestVolumeData={volume:vol,date:w.date}}
    });
  });

  return{maxWeight:maxWeightData,bestSet:bestSetData,bestVolume:bestVolumeData,bestE1RM:bestE1RMData};
}

function suggestProgression(exerciseId,lastSets,targetRIR=2){
  if(!lastSets||!lastSets.length)return null;
  const lastSet=lastSets[lastSets.length-1];
  const avgRIR=lastSets.reduce((sum,s)=>sum+(s.rir!=null?s.rir:2),0)/lastSets.length;
  const weight=lastSet.weight||0;
  const reps=lastSet.reps||0;

  if(avgRIR<=targetRIR&&reps>=12){
    return{action:'increase_weight',weight:weight+2.5,reps:Math.max(reps-2,6),message:'Monte le poids! ⬆️'};
  }else if(avgRIR<=targetRIR){
    return{action:'increase_reps',weight,reps:reps+1,message:'Ajoute une rep! 💪'};
  }else if(avgRIR>=4){
    return{action:'deload',weight:Math.round(weight*0.9),reps,message:'Allège un peu 🌱'};
  }
  return{action:'maintain',weight,reps,message:'Continue comme ça! 🔥'};
}

            <button onClick=${()=>update('sex','female')} class="chip flex-1 ${data.sex==='female'?'active':''}">Femme</button>

        </div>

    // Step 2: Weight & Height
    html`<div class="animate-fadeIn">
      <h2 class="font-bebas text-3xl text-kiGold mb-2">Tes Mensurations</h2>
      <div class="space-y-4">
        <div>
          <label class="text-white/60 text-sm mb-1 block">Poids (kg)</label>

        ${[['sedentary','Sédentaire','Bureau, peu de mouvement'],['light','Légèrement actif','1-2 entraînements/sem'],['moderate','Modérément actif','3-4 entraînements/sem'],['active','Actif','5-6 entraînements/sem'],['very_active','Très actif','Sport quotidien + physique']].map(([k,l,d])=>
          html`<button key=${k} onClick=${()=>update('activity',k)} class="w-full text-left p-3 rounded-xl transition-all ${data.activity===k?'bg-kiGold/15 border-kiGold/40 border':'bg-white/5 border border-white/10'}">
            <div class="font-semibold ${data.activity===k?'text-kiGold':'text-white'}">${l}</div>
            <div class="text-xs text-white/50">${d}</div>

    // Step 4: Goal

            <div class="text-sm text-white/50">${d}</div>
          </button>`
        )}
      </div>
    </div>`,
    // Step 5: Level & Days
    html`<div class="animate-fadeIn">
      <h2 class="font-bebas text-3xl text-kiGold mb-2">Ton Expérience</h2>
      <div class="space-y-4">
        <div class="space-y-2">
          ${[['beginner','Débutant','< 1 an'],['intermediate','Intermédiaire','1-3 ans'],['advanced','Avancé','3+ ans']].map(([k,l,d])=>
            html`<button key=${k} onClick=${()=>update('level',k)} class="w-full text-left p-3 rounded-xl transition-all ${data.level===k?'bg-kiGold/15 border-kiGold/40 border':'bg-white/5 border border-white/10'}">
              <span class="font-semibold ${data.level===k?'text-kiGold':'text-white'}">${l}</span>
              <span class="text-white/40 text-sm ml-2">${d}</span>
            </button>`
          )}
        </div>
        <div>
          <label class="text-white/60 text-sm mb-2 block">Jours d'entraînement par semaine</label>
          <div class="flex gap-2 flex-wrap">
            ${[2,3,4,5,6].map(d=>html`<button key=${d} onClick=${()=>update('daysPerWeek',d)} class="chip ${data.daysPerWeek===d?'active':''}">${d}j</button>`)}
          </div>
        </div>
      </div>
    </div>`,
    // Step 6: Summary
    html`<div class="animate-fadeIn">
      <h2 class="font-bebas text-3xl text-kiGold mb-4">Ton Plan de Combat</h2>
      ${(()=>{
        const w=parseFloat(data.weight)||75;
        const h=parseFloat(data.height)||178;
        const a=parseFloat(data.age)||25;
        const bmr=calcBMR(data.sex,w,h,a);
        const tdee=calcTDEE(bmr,data.activity);
        const target=adjustForGoal(tdee,data.goal);
        const protein=calcProteinTarget(w,data.goal);
        return html`
          <div class="space-y-3">
            <div class="glass p-4">
              <div class="text-white/50 text-xs mb-1">BMR (Métabolisme de base)</div>
              <div class="font-orbitron text-xl text-white">${Math.round(bmr)} kcal</div>
            </div>
            <div class="glass p-4">
              <div class="text-white/50 text-xs mb-1">TDEE (Dépense totale)</div>

            </div>
            <div class="glass p-4" style="border-color:rgba(255,215,0,0.3)">

              <div class="font-orbitron text-xl text-senzuGreen">${protein}g / jour</div>
            </div>
          </div>
        `;
      })()}
    </div>`
  ];

  const canNext=()=>{
    if(step===0)return data.name.trim().length>0;
    if(step===1)return data.age>0;
    if(step===2)return data.weight>0&&data.height>0;
    return true;
  };

  const finish=()=>{
    const w=parseFloat(data.weight)||75;
    const h=parseFloat(data.height)||178;
    const a=parseFloat(data.age)||25;
    const bmr=calcBMR(data.sex,w,h,a);
    const tdee=calcTDEE(bmr,data.activity);
    const target=adjustForGoal(tdee,data.goal);
    const protein=calcProteinTarget(w,data.goal);

    const profile={...data,bmr:Math.round(bmr),tdee,calorieTarget:target,proteinTarget:protein,createdAt:new Date().toISOString()};
    store.set('profile',profile);
    store.set('onboarded',true);
    onComplete(profile);
  };

  return html`<div class="min-h-screen bg-bgPrimary flex flex-col" style="padding:var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left)">

      </div>

      <!-- Content -->
      <div class="flex-1">${steps[step]}</div>

      <!-- Navigation -->
      <div class="flex gap-3 mt-6 pb-4">
        ${step>0?html`<button onClick=${()=>setStep(s=>s-1)} class="btn-secondary flex-1">Retour</button>`:null}
        ${step<6?html`<button onClick=${()=>canNext()&&setStep(s=>s+1)} class="btn-ki flex-1" style="opacity:${canNext()?1:0.5}">Suivant</button>`
        :html`<button onClick=${finish} class="btn-ki flex-1">Commencer! 🔥</button>`}
      </div>
    </div>
  </div>`;
}

// ============================================================
// REST TIMER COMPONENT
// ============================================================
function RestTimer({duration=120,onComplete,onDismiss}){
  const[timeLeft,setTimeLeft]=useState(duration);
  const[isRunning,setIsRunning]=useState(true);
  const intervalRef=useRef(null);

  useEffect(()=>{
    if(isRunning&&timeLeft>0){
      intervalRef.current=setInterval(()=>setTimeLeft(t=>{
        if(t<=1){clearInterval(intervalRef.current);onComplete?.();return 0}
        return t-1;
      }),1000);
    }
    return()=>clearInterval(intervalRef.current);
  },[isRunning]);

  const progress=1-(timeLeft/duration);
  const r=40;const c=2*Math.PI*r;const offset=c*(1-progress);
  const mins=Math.floor(timeLeft/60);
  const secs=timeLeft%60;

  return html`<div class="fixed inset-0 z-[300] flex items-center justify-center bg-black/80 backdrop-blur-md" onClick=${e=>e.target===e.currentTarget&&onDismiss?.()}>
    <div class="animate-scaleIn text-center">
      <svg width="180" height="180" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r=${r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="6"/>
        <circle cx="50" cy="50" r=${r} fill="none" stroke=${timeLeft<10?'#FF4C6A':'#FFD700'} strokeWidth="6"
          strokeDasharray=${c} strokeDashoffset=${offset} class="progress-ring" strokeLinecap="round"
          style="transition:stroke-dashoffset 1s linear"/>
        <text x="50" y="45" textAnchor="middle" fill="white" fontFamily="Orbitron" fontSize="18" fontWeight="700">${mins}:${String(secs).padStart(2,'0')}</text>
        <text x="50" y="60" textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize="6" fontFamily="DM Sans">REPOS</text>
      </svg>
      <div class="flex gap-3 mt-6 justify-center">
        <button onClick=${()=>setIsRunning(r=>!r)} class="btn-secondary text-sm px-6">${isRunning?'Pause':'Reprendre'}</button>
        <button onClick=${onDismiss} class="btn-ki text-sm px-6">Passer</button>
      </div>
    </div>
  </div>`;
}

function TrainingPage(){
  const{profile}=useContext(AppContext);
  const[view,setView]=useState('main'); // main, programs, sagas, workout, exercise_picker
  const[activeWorkout,setActiveWorkout]=useState(store.get('active_workout',null));
  const[showTimer,setShowTimer]=useState(false);
  const[timerDuration,setTimerDuration]=useState(120);
  const[selectedExercise,setSelectedExercise]=useState(null);
  const[searchQuery,setSearchQuery]=useState('');
  const[filterMuscle,setFilterMuscle]=useState('');

  const allExercises=useMemo(()=>getAllExercises(),[]);

  const saveWorkout=(w)=>{store.set('active_workout',w);setActiveWorkout(w)};

  const startWorkout=(name,exercises=[])=>{
    const w={id:Date.now().toString(),date:getToday(),name:name||'Entraînement libre',exercises:exercises.map(e=>({exerciseId:e.exerciseId||e.id,sets:[]})),startTime:Date.now()};
    saveWorkout(w);
    setView('workout');
  };

  const startFromProgram=(day)=>{
    startWorkout(day.name,day.exercises);
  };

  const finishWorkout=()=>{
    if(!activeWorkout)return;
    const workouts=store.get('workouts',[]);
    const w={...activeWorkout,endTime:Date.now()};
    workouts.push(w);
    store.set('workouts',workouts);
    store.remove('active_workout');
    setActiveWorkout(null);
    setView('main');
  };

  const addExerciseToWorkout=(exercise)=>{
    if(!activeWorkout)return;
    const w={...activeWorkout};
    w.exercises=[...w.exercises,{exerciseId:exercise.id,sets:[]}];
    saveWorkout(w);
    setView('workout');
  };

  const addSet=(exIndex)=>{
    const w={...activeWorkout};
    const ex=w.exercises[exIndex];
    const lastWorkout=getLastWorkoutForExercise(ex.exerciseId);
    const lastSet=ex.sets[ex.sets.length-1];
    const prevSet=lastWorkout?.sets?.[ex.sets.length]||lastWorkout?.sets?.[0];

    ex.sets.push({
      weight:lastSet?.weight||prevSet?.weight||0,
      reps:lastSet?.reps||prevSet?.reps||0,
      rir:null,
      done:false
    });
    w.exercises=[...w.exercises];
    saveWorkout(w);
  };

  const updateSet=(exIndex,setIndex,field,value)=>{
    const w={...activeWorkout};
    w.exercises[exIndex].sets[setIndex]={...w.exercises[exIndex].sets[setIndex],[field]:value};
    w.exercises=[...w.exercises];
    saveWorkout(w);
  };

  const validateSet=(exIndex,setIndex)=>{
    const w={...activeWorkout};
    w.exercises[exIndex].sets[setIndex].done=true;
    w.exercises=[...w.exercises];
    saveWorkout(w);

    const exData=allExercises.find(e=>e.id===w.exercises[exIndex].exerciseId);
    const dur=exData?.category==='compound'?150:90;
    setTimerDuration(dur);
    setShowTimer(true);
  };

  const removeSet=(exIndex,setIndex)=>{
    const w={...activeWorkout};
    w.exercises[exIndex].sets.splice(setIndex,1);
    w.exercises=[...w.exercises];
    saveWorkout(w);
  };

  const copyLastSession=(exIndex)=>{
    const w={...activeWorkout};
    const ex=w.exercises[exIndex];
    const last=getLastWorkoutForExercise(ex.exerciseId);
    if(!last?.sets)return;
    ex.sets=last.sets.map(s=>({weight:s.weight,reps:s.reps,rir:null,done:false}));
    w.exercises=[...w.exercises];
    saveWorkout(w);
  };

  // Filter exercises for picker
  const filteredExercises=useMemo(()=>{
    let exs=allExercises;
    if(searchQuery){
      const q=searchQuery.toLowerCase();
      exs=exs.filter(e=>e.name.toLowerCase().includes(q)||e.primaryMuscles.some(m=>m.toLowerCase().includes(q)));
    }
    if(filterMuscle){
      exs=exs.filter(e=>e.primaryMuscles.includes(filterMuscle));
    }
    return exs;
  },[searchQuery,filterMuscle,allExercises]);

  // Exercise Picker
  if(view==='exercise_picker'){
    return html`<div class="page-scroll">
      <div class="p-5">
        <div class="flex items-center gap-3 mb-4">
          <button onClick=${()=>setView('workout')} class="p-2 rounded-full bg-white/5 min-w-[44px] min-h-[44px] flex items-center justify-center">${Icons.chevronLeft}</button>
          <h2 class="font-bebas text-2xl text-kiGold">Ajouter un exercice</h2>
        </div>

        <div class="relative mb-4">
          <input type="text" value=${searchQuery} onInput=${e=>setSearchQuery(e.target.value)} placeholder="Rechercher..." class="w-full pl-10"/>
          <div class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40">${Icons.search}</div>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-3 mb-4" style="-webkit-overflow-scrolling:touch">
          <button onClick=${()=>setFilterMuscle('')} class="chip whitespace-nowrap ${!filterMuscle?'active':''}">Tous</button>
          ${MUSCLE_GROUPS.map(m=>html`<button key=${m} onClick=${()=>setFilterMuscle(m)} class="chip whitespace-nowrap ${filterMuscle===m?'active':''}">${m}</button>`)}
        </div>

        <div class="space-y-2">
          ${filteredExercises.slice(0,50).map(ex=>html`

                <div class="text-xs text-white/40 mt-0.5">${ex.primaryMuscles.join(', ')} • ${ex.equipment}</div>
              </div>
              <div class="text-kiGold">${Icons.plus}</div>
            </button>
          `)}
        </div>
      </div>
    </div>`;
  }

  // Active Workout View
  if(view==='workout'&&activeWorkout){
    const elapsed=Math.floor((Date.now()-activeWorkout.startTime)/60000);

    return html`<div class="page-scroll">
      <div class="p-5">

            <h2 class="font-bebas text-2xl text-kiGold">${activeWorkout.name}</h2>

        <div class="space-y-4">
          ${activeWorkout.exercises.map((ex,exI)=>{
            const exData=allExercises.find(e=>e.id===ex.exerciseId);
            if(!exData)return null;
            const lastWorkout=getLastWorkoutForExercise(ex.exerciseId);
            const prs=getPRsForExercise(ex.exerciseId);
            const progression=lastWorkout?.sets?suggestProgression(ex.exerciseId,lastWorkout.sets):null;

            return html`<div key=${exI} class="glass p-4 animate-fadeIn" style="animation-delay:${exI*0.05}s">
              <div class="flex items-center justify-between mb-3">
                <div>
                  <h3 class="font-semibold text-white">${exData.name}</h3>
                  <div class="text-xs text-white/40">${exData.primaryMuscles.join(', ')}</div>
                </div>
                ${prs.maxWeight?html`<span class="badge-pr badge-gold">PR ${prs.maxWeight.weight}kg</span>`:null}
              </div>

              <!-- Last workout data -->
              ${lastWorkout?html`<div class="mb-3 p-2 rounded-lg bg-white/3">
                <div class="flex items-center justify-between text-xs text-white/40 mb-1">
                  <span>Dernière séance</span>
                  <button onClick=${()=>copyLastSession(exI)} class="flex items-center gap-1 text-ssjBlue">${Icons.copy} Copier</button>
                </div>
                <div class="flex gap-2 flex-wrap">
                  ${lastWorkout.sets.map((s,i)=>html`<span key=${i} class="text-xs text-white/50">${s.weight}kg×${s.reps}</span>`)}
                </div>

              ${progression?html`<div class="mb-3 p-2 rounded-lg bg-kiGold/5 border border-kiGold/10 text-xs text-kiGold/80">${progression.message} Suggestion: ${progression.weight}kg × ${progression.reps}</div>`:null}

              <!-- Sets -->
              <div class="space-y-2">
                <div class="grid grid-cols-12 gap-2 text-xs text-white/40 px-1">

                  <div class="col-span-2">RIR</div>
                  <div class="col-span-3"></div>
                </div>
                ${ex.sets.map((set,setI)=>html`
                  <div key=${setI} class="grid grid-cols-12 gap-2 items-center ${set.done?'opacity-60':''}">
                    <div class="col-span-1 text-sm text-white/40 font-semibold">${setI+1}</div>
                    <div class="col-span-3"><input type="number" value=${set.weight||''} onInput=${e=>updateSet(exI,setI,'weight',parseFloat(e.target.value)||0)} class="w-full text-center py-2 text-sm" disabled=${set.done}/></div>
                    <div class="col-span-3"><input type="number" value=${set.reps||''} onInput=${e=>updateSet(exI,setI,'reps',parseInt(e.target.value)||0)} class="w-full text-center py-2 text-sm" disabled=${set.done}/></div>
                    <div class="col-span-2"><input type="number" value=${set.rir!=null?set.rir:''} onInput=${e=>updateSet(exI,setI,'rir',parseInt(e.target.value))} placeholder="-" class="w-full text-center py-2 text-sm" disabled=${set.done}/></div>
                    <div class="col-span-3 flex gap-1">
                      ${!set.done?html`<button onClick=${()=>validateSet(exI,setI)} class="w-9 h-9 rounded-lg bg-senzuGreen/20 text-senzuGreen flex items-center justify-center">${Icons.check}</button>`:html`<span class="text-senzuGreen text-xs">✓</span>`}
                      <button onClick=${()=>removeSet(exI,setI)} class="w-9 h-9 rounded-lg bg-kiRed/10 text-kiRed/60 flex items-center justify-center text-xs">${Icons.trash}</button>
                    </div>
                  </div>
                `)}
              </div>

              <button onClick=${()=>addSet(exI)} class="w-full mt-3 p-2 rounded-xl bg-white/5 text-white/60 text-sm font-semibold flex items-center justify-center gap-1 min-h-[44px]">
                ${Icons.plus} Ajouter série
              </button>
            </div>`;
          })}
        </div>

        <div class="mt-4 space-y-3">
          <button onClick=${()=>{setSearchQuery('');setFilterMuscle('');setView('exercise_picker')}} class="btn-secondary w-full">${Icons.plus} Ajouter un exercice</button>
          <button onClick=${finishWorkout} class="btn-ki w-full">Terminer l'entraînement ✓</button>
        </div>
      </div>
      ${showTimer?html`<${RestTimer} duration=${timerDuration} onComplete=${()=>setShowTimer(false)} onDismiss=${()=>setShowTimer(false)}/>`:null}
    </div>`;
  }

  // Programs View
  if(view==='programs'){
    return html`<div class="page-scroll">
      <div class="p-5">
        <div class="flex items-center gap-3 mb-4">
          <button onClick=${()=>setView('main')} class="p-2 rounded-full bg-white/5 min-w-[44px] min-h-[44px] flex items-center justify-center">${Icons.chevronLeft}</button>
          <h2 class="font-bebas text-2xl text-kiGold">Programmes</h2>
        </div>

          ${PROGRAMS_DB.map(prog=>{
            const match=prog.level===profile?.level||(prog.level==='beginner'&&(!profile?.level||profile.level==='beginner'));

              <div class="flex items-center justify-between mb-2">

                ${match?html`<span class="badge-pr badge-gold">Recommandé</span>`:null}

              <div class="flex items-center gap-3 text-xs text-white/40 mb-3">
                <span>${prog.days}j/sem</span>
                <span>•</span>
                <span>${prog.level==='beginner'?'Débutant':prog.level==='intermediate'?'Intermédiaire':'Avancé'}</span>

                ${prog.weeks[0].days.map((day,i)=>html`
                  <button key=${i} onClick=${()=>startFromProgram(day)} class="w-full text-left p-3 rounded-xl bg-white/5 flex items-center justify-between min-h-[44px]">
                    <span class="text-sm text-white">${day.name}</span>
                    <span class="text-kiGold text-sm">${day.exercises.length} exos →</span>
                  </button>
                `)}
              </div>
            </div>`;
          })}
        </div>
      </div>
    </div>`;

  // Sagas View
  if(view==='sagas'){

    return html`<div class="page-scroll">
      <div class="p-5">
        <div class="flex items-center gap-3 mb-4">
          <button onClick=${()=>setView('main')} class="p-2 rounded-full bg-white/5 min-w-[44px] min-h-[44px] flex items-center justify-center">${Icons.chevronLeft}</button>

              </div>`;
            })}
          </div>
        </div>`;
      })()}

      <div class="text-center text-xs text-white/20 py-4">Propulsé par Katrava</div>
    </div>
  </div>`;
}

  const allPRs=useMemo(()=>{
    const prs=[];
    const exerciseIds=new Set();
    workouts.forEach(w=>w.exercises?.forEach(ex=>exerciseIds.add(ex.exerciseId)));
    exerciseIds.forEach(id=>{
      const exData=allExercises.find(e=>e.id===id);
      if(!exData)return;
      const pr=getPRsForExercise(id);
      if(pr.maxWeight||pr.bestE1RM)prs.push({exercise:exData,...pr});
    });
    return prs.sort((a,b)=>(b.bestE1RM?.e1rm||0)-(a.bestE1RM?.e1rm||0));
  },[workouts]);

  // Volume chart data
  const volumeData=useMemo(()=>{
    const last30=[];
    const now=new Date();
    for(let i=29;i>=0;i--){
      const d=new Date(now);d.setDate(d.getDate()-i);
      const ds=d.toISOString().split('T')[0];
      const dayWorkouts=workouts.filter(w=>w.date===ds);
      let vol=0;
      dayWorkouts.forEach(w=>w.exercises?.forEach(ex=>ex.sets?.forEach(s=>{vol+=(s.weight||0)*(s.reps||0)})));
      last30.push({date:formatDate(ds),volume:Math.round(vol/1000)});
    }
    return last30;
  },[workouts]);

  const addBodyWeight=()=>{
    const w=parseFloat(newWeight);
    if(!w)return;
    const bw=[...bodyWeights,{date:getToday(),weight:w}];
    store.set('body_weights',bw);
    setBodyWeights(bw);
    setNewWeight('');
    setShowAddWeight(false);
  };

  // Strength standards
  const strengthStandards=(exerciseId)=>{
    const bw=parseFloat(profile?.weight)||75;
    const sex=profile?.sex||'male';
    const standards={
      bench_press:{male:[0.5,1,1.5,2],female:[0.25,0.5,0.75,1.25]},
      squat:{male:[0.75,1.25,1.75,2.5],female:[0.5,1,1.25,1.75]},
      deadlift:{male:[1,1.5,2,2.75],female:[0.75,1.25,1.5,2]}
    };
    const s=standards[exerciseId];
    if(!s)return null;
    const m=s[sex]||s['male'];
    return{beginner:Math.round(bw*m[0]),intermediate:Math.round(bw*m[1]),advanced:Math.round(bw*m[2]),elite:Math.round(bw*m[3])};
  };

  return html`<div class="page-scroll">
    <div class="p-5 space-y-5">
      <h1 class="font-bebas text-3xl text-kiGold animate-fadeIn">Statistiques</h1>

      <!-- Tabs -->
      <div class="flex gap-2 animate-fadeIn" style="animation-delay:0.05s">
        ${[['prs','Records'],['body','Corps'],['progress','Progression']].map(([k,l])=>
          html`<button key=${k} onClick=${()=>setTab(k)} class="chip flex-1 ${tab===k?'active':''}">${l}</button>`
        )}
      </div>

      ${tab==='prs'?html`
        <!-- Volume Chart -->
        <div class="glass p-4 animate-fadeIn" style="animation-delay:0.1s">
          <h3 class="font-bebas text-lg text-white mb-3">Volume (30 jours)</h3>
          <div style="height:180px">
            <${ResponsiveContainer} width="100%" height="100%">
              <${AreaChart} data=${volumeData}>
                <defs>
                  <linearGradient id="volGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor="#FFD700" stopOpacity=${0.3}/>
                    <stop offset="95%" stopColor="#FFD700" stopOpacity=${0}/>
                  </linearGradient>
                </defs>
                <${XAxis} dataKey="date" tick=${{fontSize:10,fill:'rgba(255,255,255,0.3)'}} tickLine=${false} axisLine=${false}/>
                <${YAxis} tick=${{fontSize:10,fill:'rgba(255,255,255,0.3)'}} tickLine=${false} axisLine=${false} width=${30}/>
                <${Area} type="monotone" dataKey="volume" stroke="#FFD700" fill="url(#volGrad)" strokeWidth=${2}/>
              <//>
            <//>
          </div>
        </div>

        <!-- PRs List -->
        <div class="animate-fadeIn" style="animation-delay:0.15s">
          <h3 class="font-bebas text-xl text-white mb-3">Records Personnels</h3>
          <div class="space-y-3">
            ${allPRs.slice(0,20).map((pr,i)=>{
              const std=strengthStandards(pr.exercise.id);
              return html`<div key=${i} class="glass-card p-4">
                <h4 class="font-semibold text-white mb-2">${pr.exercise.name}</h4>
                <div class="grid grid-cols-2 gap-2">
                  ${pr.maxWeight?html`<div class="p-2 rounded-lg bg-kiGold/5">
                    <div class="text-xs text-white/40">Max poids</div>
                    <div class="font-orbitron text-sm text-kiGold">${pr.maxWeight.weight}kg</div>
                  </div>`:null}
                  ${pr.bestE1RM?html`<div class="p-2 rounded-lg bg-ssjBlue/5">
                    <div class="text-xs text-white/40">e1RM</div>
                    <div class="font-orbitron text-sm text-ssjBlue">${pr.bestE1RM.e1rm}kg</div>
                  </div>`:null}
                  ${pr.bestSet?html`<div class="p-2 rounded-lg bg-senzuGreen/5">
                    <div class="text-xs text-white/40">Best set</div>
                    <div class="font-orbitron text-sm text-senzuGreen">${pr.bestSet.weight}×${pr.bestSet.reps}</div>
                  </div>`:null}
                  ${pr.bestVolume?html`<div class="p-2 rounded-lg bg-ssjOrange/5">
                    <div class="text-xs text-white/40">Volume</div>
                    <div class="font-orbitron text-sm text-ssjOrange">${Math.round(pr.bestVolume.volume/1000)}k</div>
                  </div>`:null}
                </div>
                ${std?html`<div class="mt-2 p-2 rounded-lg bg-white/3">
                  <div class="text-xs text-white/30 mb-1">Standards de force</div>
                  <div class="flex gap-2 text-xs">
                    <span class="text-white/40">Déb: ${std.beginner}kg</span>
                    <span class="text-white/50">Inter: ${std.intermediate}kg</span>
                    <span class="text-white/60">Avancé: ${std.advanced}kg</span>
                    <span class="text-kiGold">Elite: ${std.elite}kg</span>
                  </div>
                </div>`:null}
              </div>`;
            })}
          </div>
        </div>
      `:tab==='body'?html`
        <!-- Body Tracking -->
        <div class="glass p-4 animate-fadeIn">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-bebas text-lg text-white">Poids corporel</h3>
            <button onClick=${()=>setShowAddWeight(true)} class="text-sm text-kiGold font-semibold">${Icons.plus} Ajouter</button>
          </div>
          ${bodyWeights.length>2?html`
            <div style="height:200px">
              <${ResponsiveContainer} width="100%" height="100%">
                <${LineChart} data=${bodyWeights.slice(-30)}>
                  <${XAxis} dataKey="date" tick=${{fontSize:10,fill:'rgba(255,255,255,0.3)'}} tickLine=${false} axisLine=${false}/>
                  <${YAxis} tick=${{fontSize:10,fill:'rgba(255,255,255,0.3)'}} tickLine=${false} axisLine=${false} width=${35} domain=${['dataMin-2','dataMax+2']}/>
                  <${Line} type="monotone" dataKey="weight" stroke="#00BFFF" strokeWidth=${2} dot=${{fill:'#00BFFF',r:3}}/>
                <//>
              <//>
            </div>
          `:html`<p class="text-sm text-white/40 py-4 text-center">Ajoute au moins 3 mesures pour voir le graphique</p>`}

          ${bodyWeights.length?html`<div class="mt-3 space-y-1">
            ${bodyWeights.slice(-5).reverse().map((bw,i)=>html`
              <div key=${i} class="flex justify-between text-sm p-2 rounded-lg bg-white/3">
                <span class="text-white/50">${formatDate(bw.date)}</span>
                <span class="text-white font-semibold">${bw.weight} kg</span>
              </div>
            `)}
          </div>`:null}
        </div>

        ${showAddWeight?html`<${Modal} onClose=${()=>setShowAddWeight(false)} center title="Ajouter poids">
          <div class="space-y-4">
            <input type="number" step="0.1" value=${newWeight} onInput=${e=>setNewWeight(e.target.value)} placeholder="75.5" class="w-full text-2xl text-center font-orbitron"/>
            <button onClick=${addBodyWeight} class="btn-ki w-full">Enregistrer</button>
          </div>
        <//>`:null}
      `:html`
        <!-- Progress Charts -->
        <div class="glass p-4 animate-fadeIn">
          <h3 class="font-bebas text-lg text-white mb-3">Séances par semaine</h3>
          <div style="height:180px">
            <${ResponsiveContainer} width="100%" height="100%">
              <${BarChart} data=${(()=>{
                const weeks=[];
                for(let i=7;i>=0;i--){
                  const end=new Date();end.setDate(end.getDate()-i*7);
                  const start=new Date(end);start.setDate(start.getDate()-7);
                  const count=workouts.filter(w=>{const d=new Date(w.date);return d>=start&&d<end}).length;
                  weeks.push({week:'S'+(8-i),count});
                }
                return weeks;
              })()}>
                <${XAxis} dataKey="week" tick=${{fontSize:10,fill:'rgba(255,255,255,0.3)'}} tickLine=${false} axisLine=${false}/>
                <${YAxis} tick=${{fontSize:10,fill:'rgba(255,255,255,0.3)'}} tickLine=${false} axisLine=${false} width=${20}/>
                <${Bar} dataKey="count" fill="#FFD700" radius=${[4,4,0,0]}/>
              <//>
            <//>
          </div>
        </div>
      `}

      <div class="text-center text-xs text-white/20 py-4">Propulsé par Katrava</div>
    </div>
  </div>`;
}

function NutritionPage(){
  const{profile}=useContext(AppContext);
  const[tab,setTab]=useState('tracking'); // tracking, recipes
  const[meals,setMeals]=useState(store.get('meals_'+getToday(),[]));
  const[showAddFood,setShowAddFood]=useState(false);
  const[foodSearch,setFoodSearch]=useState('');
  const[filterGoal,setFilterGoal]=useState('');
  const[filterMeal,setFilterMeal]=useState('');
  const[water,setWater]=useState(store.get('water_'+getToday(),0));
  const[selectedRecipe,setSelectedRecipe]=useState(null);

  const target=profile?.calorieTarget||2200;
  const proteinTarget=profile?.proteinTarget||150;

  const totals=meals.reduce((acc,m)=>({cal:acc.cal+m.cal,p:acc.p+m.p,c:acc.c+m.c,f:acc.f+m.f}),{cal:0,p:0,c:0,f:0});

  const remaining={cal:target-totals.cal,p:proteinTarget-totals.p};

  const addFood=(food,qty=1)=>{
    const newMeals=[...meals,{...food,cal:Math.round(food.cal*qty),p:Math.round(food.p*qty),c:Math.round(food.c*qty),f:Math.round(food.f*qty),qty,time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}];
    setMeals(newMeals);
    store.set('meals_'+getToday(),newMeals);
    setShowAddFood(false);
  };

  const addRecipeAsMeal=(recipe)=>{
    addFood({name:recipe.name,cal:recipe.calories,p:recipe.protein,c:recipe.carbs,f:recipe.fat},1);
    setSelectedRecipe(null);
  };

  const addWater=()=>{
    const w=water+250;
    setWater(w);
    store.set('water_'+getToday(),w);
  };

  const filteredFoods=useMemo(()=>{
    if(!foodSearch)return FOODS_DB;
    return FOODS_DB.filter(f=>f.name.toLowerCase().includes(foodSearch.toLowerCase()));
  },[foodSearch]);

  const filteredRecipes=useMemo(()=>{
    let r=RECIPES_DB;
    if(filterGoal)r=r.filter(rc=>rc.goal===filterGoal);
    if(filterMeal)r=r.filter(rc=>rc.mealType===filterMeal);
    // Sort by matching remaining macros
    return r;
  },[filterGoal,filterMeal]);

  return html`<div class="page-scroll">
    <div class="p-5 space-y-5">
      <h1 class="font-bebas text-3xl text-kiGold animate-fadeIn">Nutrition</h1>

      <!-- Tabs -->
      <div class="flex gap-2 animate-fadeIn">
        <button onClick=${()=>setTab('tracking')} class="chip flex-1 ${tab==='tracking'?'active':''}">Suivi</button>
        <button onClick=${()=>setTab('recipes')} class="chip flex-1 ${tab==='recipes'?'active':''}">Recettes</button>
      </div>

      ${tab==='tracking'?html`
        <!-- Calorie Ring -->
        <div class="glass p-5 text-center animate-fadeIn" style="animation-delay:0.1s">
          <svg width="160" height="160" viewBox="0 0 100 100" class="mx-auto">
            <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8"/>
            <circle cx="50" cy="50" r="42" fill="none" stroke="#FFD700" strokeWidth="8"
              strokeDasharray=${2*Math.PI*42} strokeDashoffset=${2*Math.PI*42*(1-Math.min(1,totals.cal/target))}
              class="progress-ring" strokeLinecap="round"/>
            <text x="50" y="44" textAnchor="middle" fill="white" fontFamily="Orbitron" fontSize="14" fontWeight="700">${Math.round(totals.cal)}</text>
            <text x="50" y="56" textAnchor="middle" fill="rgba(255,255,255,0.4)" fontSize="6" fontFamily="DM Sans">/ ${target} kcal</text>
          </svg>
          <div class="grid grid-cols-3 gap-4 mt-4">
            <div><div class="font-orbitron text-lg text-ssjBlue">${Math.round(totals.p)}g</div><div class="text-xs text-white/40">Protéines</div></div>
            <div><div class="font-orbitron text-lg text-ssjOrange">${Math.round(totals.c)}g</div><div class="text-xs text-white/40">Glucides</div></div>
            <div><div class="font-orbitron text-lg text-kiRed">${Math.round(totals.f)}g</div><div class="text-xs text-white/40">Lipides</div></div>
          </div>
        </div>

        <!-- Water -->
        <div class="glass p-4 flex items-center justify-between animate-fadeIn" style="animation-delay:0.15s">
          <div class="flex items-center gap-3">
            <div class="text-2xl">💧</div>
            <div>
              <div class="font-semibold text-white">${water}ml</div>
              <div class="text-xs text-white/40">/ 2500ml</div>
            </div>
          </div>
          <button onClick=${addWater} class="btn-ki text-sm px-4 py-2">+250ml</button>
        </div>

        <!-- Add Food Button -->
        <button onClick=${()=>setShowAddFood(true)} class="btn-ki w-full animate-fadeIn" style="animation-delay:0.2s">${Icons.plus} Ajouter un aliment</button>

        <!-- Today's Foods -->
        ${meals.length?html`<div class="space-y-2 animate-fadeIn" style="animation-delay:0.25s">
          ${meals.map((m,i)=>html`<div key=${i} class="glass-card p-3 flex items-center justify-between">
            <div>
              <div class="text-sm font-semibold text-white">${m.name}</div>
              <div class="text-xs text-white/40">${m.time}</div>
            </div>
            <div class="text-right">
              <div class="font-orbitron text-sm text-kiGold">${m.cal} kcal</div>
              <div class="text-xs text-white/40">P:${m.p} C:${m.c} F:${m.f}</div>
            </div>
          </div>`)}
        </div>`:null}

        <!-- Add Food Modal -->
        ${showAddFood?html`<${Modal} onClose=${()=>setShowAddFood(false)} title="Ajouter un aliment">
          <input type="text" value=${foodSearch} onInput=${e=>setFoodSearch(e.target.value)} placeholder="Rechercher..." class="w-full mb-4"/>
          <div class="space-y-2 max-h-[50vh] overflow-y-auto">
            ${filteredFoods.map(f=>html`
              <button key=${f.id} onClick=${()=>addFood(f)} class="w-full glass-card p-3 flex items-center justify-between text-left">
                <div>
                  <div class="text-sm text-white">${f.name}</div>
                  <div class="text-xs text-white/40">P:${f.p} C:${f.c} F:${f.f}</div>
                </div>
                <div class="font-orbitron text-sm text-kiGold">${f.cal}</div>
              </button>
            `)}
          </div>
        <//>`:null}
      `:html`
        <!-- Recipes -->
        <div class="flex gap-2 overflow-x-auto pb-2 animate-fadeIn">
          <button onClick=${()=>setFilterGoal('')} class="chip whitespace-nowrap ${!filterGoal?'active':''}">Tous</button>
          <button onClick=${()=>setFilterGoal('cut')} class="chip whitespace-nowrap ${filterGoal==='cut'?'active':''}">🔥 Sèche</button>
          <button onClick=${()=>setFilterGoal('maintain')} class="chip whitespace-nowrap ${filterGoal==='maintain'?'active':''}">⚖️ Maintien</button>
          <button onClick=${()=>setFilterGoal('bulk')} class="chip whitespace-nowrap ${filterGoal==='bulk'?'active':''}">💪 Prise</button>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-2 animate-fadeIn">
          <button onClick=${()=>setFilterMeal('')} class="chip whitespace-nowrap ${!filterMeal?'active':''}">Tous</button>
          ${[['breakfast','🌅 Petit-dej'],['lunch','🍽️ Déjeuner'],['dinner','🌙 Dîner'],['snack','🥜 Snack']].map(([k,l])=>
            html`<button key=${k} onClick=${()=>setFilterMeal(k)} class="chip whitespace-nowrap ${filterMeal===k?'active':''}">${l}</button>`
          )}
        </div>

        ${remaining.cal>0?html`<div class="text-xs text-white/40 animate-fadeIn">Il te reste ~${Math.round(remaining.cal)} kcal et ~${Math.round(Math.max(0,remaining.p))}g de protéines</div>`:null}

        <div class="space-y-3">
          ${filteredRecipes.map(r=>html`
            <button key=${r.id} onClick=${()=>setSelectedRecipe(r)} class="w-full glass-card p-4 text-left animate-fadeIn">
              <div class="flex items-center justify-between mb-2">
                <h3 class="font-semibold text-white">${r.name}</h3>
                <span class="font-orbitron text-sm text-kiGold">${r.calories} kcal</span>
              </div>
              <div class="flex items-center gap-3 text-xs text-white/40">
                <span class="text-ssjBlue">P:${r.protein}g</span>
                <span class="text-ssjOrange">G:${r.carbs}g</span>
                <span class="text-kiRed">L:${r.fat}g</span>
                <span>•</span>
                <span>${r.prepTime+r.cookTime}min</span>
                <span>•</span>
                <span>${'⭐'.repeat(r.difficulty)}</span>
              </div>
            </button>
          `)}
        </div>

        <!-- Recipe Detail Modal -->
        ${selectedRecipe?html`<${Modal} onClose=${()=>setSelectedRecipe(null)} title=${selectedRecipe.name}>
          <div class="space-y-4">
            <div class="grid grid-cols-4 gap-2 text-center">
              <div class="glass p-2"><div class="font-orbitron text-lg text-kiGold">${selectedRecipe.calories}</div><div class="text-xs text-white/40">kcal</div></div>
              <div class="glass p-2"><div class="font-orbitron text-lg text-ssjBlue">${selectedRecipe.protein}g</div><div class="text-xs text-white/40">Prot</div></div>
              <div class="glass p-2"><div class="font-orbitron text-lg text-ssjOrange">${selectedRecipe.carbs}g</div><div class="text-xs text-white/40">Gluc</div></div>
              <div class="glass p-2"><div class="font-orbitron text-lg text-kiRed">${selectedRecipe.fat}g</div><div class="text-xs text-white/40">Lip</div></div>
            </div>

            <div>
              <h4 class="font-semibold text-white mb-2">Ingrédients</h4>
              <div class="space-y-1">
                ${selectedRecipe.ingredients.map((ing,i)=>html`<div key=${i} class="text-sm text-white/60 flex items-center gap-2">
                  <span class="text-kiGold">•</span> ${ing}
                </div>`)}
              </div>
            </div>

            <div>
              <h4 class="font-semibold text-white mb-2">Préparation</h4>
              <div class="space-y-2">
                ${selectedRecipe.steps.map((step,i)=>html`<div key=${i} class="text-sm text-white/60 flex gap-3">

                  <span>${step}</span>
                </div>`)}

            <button onClick=${()=>addRecipeAsMeal(selectedRecipe)} class="btn-ki w-full">Ajouter au suivi 📝</button>
          </div>
        <//>`:null}
      `}

      <div class="text-center text-xs text-white/20 py-4">Propulsé par Katrava</div>
    </div>
  </div>`;
}

function ProfilePage(){
  const{profile,setProfile}=useContext(AppContext);
  const[showEdit,setShowEdit]=useState(false);
  const[editData,setEditData]=useState({...profile});
  const[showCustomExercise,setShowCustomExercise]=useState(false);
  const[customEx,setCustomEx]=useState({name:'',primaryMuscles:['Pectoraux'],equipment:'Haltères',notes:'',difficulty:2});

  const workouts=store.get('workouts',[]);
  const powerLevel=calcPowerLevel(profile);
  const transformation=getTransformation(powerLevel);

  const saveProfile=()=>{
    const w=parseFloat(editData.weight)||75;
    const h=parseFloat(editData.height)||178;
    const a=parseFloat(editData.age)||25;
    const bmr=calcBMR(editData.sex,w,h,a);
    const tdee=calcTDEE(bmr,editData.activity);
    const target=adjustForGoal(tdee,editData.goal);
    const protein=calcProteinTarget(w,editData.goal);
    const updated={...editData,bmr:Math.round(bmr),tdee,calorieTarget:target,proteinTarget:protein};
    store.set('profile',updated);
    setProfile(updated);
    setShowEdit(false);
  };

  const addCustomExercise=()=>{
    if(!customEx.name.trim())return;
    const customs=store.get('custom_exercises',[]);
    const newEx={id:'custom_'+Date.now(),name:customEx.name,primaryMuscles:customEx.primaryMuscles,secondaryMuscles:[],equipment:customEx.equipment,difficulty:customEx.difficulty,formTips:customEx.notes||'',alternatives:[],category:'isolation',custom:true};
    customs.push(newEx);
    store.set('custom_exercises',customs);
    setShowCustomExercise(false);
    setCustomEx({name:'',primaryMuscles:['Pectoraux'],equipment:'Haltères',notes:'',difficulty:2});
  };

  const resetData=()=>{
    if(confirm('Supprimer toutes les données? Cette action est irréversible.')){
      Object.keys(localStorage).filter(k=>k.startsWith(STORE_KEY)).forEach(k=>localStorage.removeItem(k));
      window.location.reload();
    }
  };

  return html`<div class="page-scroll">
    <div class="p-5 space-y-5">
      <h1 class="font-bebas text-3xl text-kiGold animate-fadeIn">Profil</h1>

      <!-- Profile Card -->
      <div class="glass p-5 text-center animate-fadeIn" style="animation-delay:0.05s">
        <div class="w-24 h-24 rounded-full mx-auto overflow-hidden bg-white/5 mb-3">
          <img src=${transformation.image} alt=${transformation.name} class="w-full h-full object-cover" onerror="this.style.display='none'"/>
        </div>
        <h2 class="font-bebas text-2xl text-white">${profile?.name||'Guerrier'}</h2>
        <div class="text-sm" style="color:${transformation.color}">${transformation.name}</div>
        <div class="font-orbitron text-xl text-kiGold mt-1">${powerLevel.toLocaleString()} PL</div>
      </div>

      <!-- TDEE Summary -->
      <div class="glass p-4 animate-fadeIn" style="animation-delay:0.1s">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bebas text-lg text-white">Objectifs Nutritionnels</h3>
          <button onClick=${()=>{setEditData({...profile});setShowEdit(true)}} class="text-kiGold text-sm">${Icons.edit} Modifier</button>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="p-3 rounded-xl bg-white/5">
            <div class="text-xs text-white/40">Calories cible</div>
            <div class="font-orbitron text-lg text-kiGold">${profile?.calorieTarget||2200}</div>
          </div>
          <div class="p-3 rounded-xl bg-white/5">
            <div class="text-xs text-white/40">Protéines</div>
            <div class="font-orbitron text-lg text-senzuGreen">${profile?.proteinTarget||150}g</div>
          </div>
          <div class="p-3 rounded-xl bg-white/5">
            <div class="text-xs text-white/40">TDEE</div>
            <div class="font-orbitron text-lg text-ssjBlue">${profile?.tdee||2200}</div>
          </div>
          <div class="p-3 rounded-xl bg-white/5">
            <div class="text-xs text-white/40">Objectif</div>
            <div class="font-semibold text-white">${profile?.goal==='cut'?'Sèche':profile?.goal==='bulk'?'Prise de masse':'Maintien'}</div>
          </div>
        </div>
      </div>

      <!-- Stats Summary -->
      <div class="glass p-4 animate-fadeIn" style="animation-delay:0.15s">
        <h3 class="font-bebas text-lg text-white mb-3">Résumé</h3>
        <div class="grid grid-cols-2 gap-3">
          <div class="p-3 rounded-xl bg-white/5 text-center">
            <div class="font-orbitron text-2xl text-ssjOrange">${workouts.length}</div>
            <div class="text-xs text-white/40 mt-1">Séances totales</div>
          </div>
          <div class="p-3 rounded-xl bg-white/5 text-center">
            <div class="font-orbitron text-2xl text-ssjBlue">${calcStreak(workouts)}</div>
            <div class="text-xs text-white/40 mt-1">Streak actuel</div>
          </div>
        </div>
      </div>

      <!-- Custom Exercises -->
      <div class="animate-fadeIn" style="animation-delay:0.2s">
        <button onClick=${()=>setShowCustomExercise(true)} class="btn-secondary w-full">${Icons.plus} Créer un exercice</button>
      </div>

      <!-- Reset -->
      <div class="animate-fadeIn" style="animation-delay:0.25s">
        <button onClick=${resetData} class="btn-danger w-full">Réinitialiser les données</button>
      </div>

      <div class="text-center text-xs text-white/20 py-4">Saiyan Fitness v4 • Propulsé par Katrava</div>

      <!-- Edit Modal -->
      ${showEdit?html`<${Modal} onClose=${()=>setShowEdit(false)} title="Modifier le profil">
        <div class="space-y-4">
          <div>
            <label class="text-white/60 text-sm mb-1 block">Nom</label>
            <input type="text" value=${editData.name} onInput=${e=>setEditData(p=>({...p,name:e.target.value}))} class="w-full"/>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-white/60 text-sm mb-1 block">Poids (kg)</label>
              <input type="number" value=${editData.weight} onInput=${e=>setEditData(p=>({...p,weight:e.target.value}))} class="w-full"/>
            </div>
            <div>
              <label class="text-white/60 text-sm mb-1 block">Taille (cm)</label>
              <input type="number" value=${editData.height} onInput=${e=>setEditData(p=>({...p,height:e.target.value}))} class="w-full"/>
            </div>
          </div>
          <div>
            <label class="text-white/60 text-sm mb-1 block">Objectif</label>
            <div class="flex gap-2">
              ${[['cut','Sèche'],['maintain','Maintien'],['bulk','Prise']].map(([k,l])=>
                html`<button key=${k} onClick=${()=>setEditData(p=>({...p,goal:k}))} class="chip flex-1 ${editData.goal===k?'active':''}">${l}</button>`
              )}
            </div>
          </div>
          <div>
            <label class="text-white/60 text-sm mb-1 block">Activité</label>
            <select value=${editData.activity} onChange=${e=>setEditData(p=>({...p,activity:e.target.value}))} class="w-full">
              <option value="sedentary">Sédentaire</option>
              <option value="light">Légèrement actif</option>
              <option value="moderate">Modérément actif</option>
              <option value="active">Actif</option>
              <option value="very_active">Très actif</option>
            </select>
          </div>
          <button onClick=${saveProfile} class="btn-ki w-full">Sauvegarder</button>
        </div>
      <//>`:null}

      <!-- Custom Exercise Modal -->
      ${showCustomExercise?html`<${Modal} onClose=${()=>setShowCustomExercise(false)} title="Créer un exercice">
        <div class="space-y-4">
          <div>
            <label class="text-white/60 text-sm mb-1 block">Nom de l'exercice</label>
            <input type="text" value=${customEx.name} onInput=${e=>setCustomEx(p=>({...p,name:e.target.value}))} placeholder="Mon exercice" class="w-full"/>
          </div>
          <div>
            <label class="text-white/60 text-sm mb-1 block">Muscle principal</label>
            <select value=${customEx.primaryMuscles[0]} onChange=${e=>setCustomEx(p=>({...p,primaryMuscles:[e.target.value]}))} class="w-full">
              ${MUSCLE_GROUPS.map(m=>html`<option key=${m} value=${m}>${m}</option>`)}
            </select>
          </div>
          <div>
            <label class="text-white/60 text-sm mb-1 block">Équipement</label>
            <select value=${customEx.equipment} onChange=${e=>setCustomEx(p=>({...p,equipment:e.target.value}))} class="w-full">
              ${EQUIPMENT.map(eq=>html`<option key=${eq} value=${eq}>${eq}</option>`)}
            </select>
          </div>
          <div>
            <label class="text-white/60 text-sm mb-1 block">Notes / Conseils</label>
            <textarea value=${customEx.notes} onInput=${e=>setCustomEx(p=>({...p,notes:e.target.value}))} placeholder="Conseils de forme..." class="w-full" rows="3"/>
          </div>
          <button onClick=${addCustomExercise} class="btn-ki w-full">Créer l'exercice</button>
        </div>
      <//>`:null}
    </div>
  </div>`;
}

// ============================================================
// MAIN APP
// ============================================================
function App(){
  const[onboarded,setOnboarded]=useState(store.get('onboarded',false));
  const[profile,setProfile]=useState(store.get('profile',null));
  const[page,setPage]=useState('home');

  const navigateTo=useCallback((p)=>setPage(p),[]);

  const contextValue=useMemo(()=>({profile,setProfile,navigateTo}),[profile]);

  if(!onboarded){
    return html`<${Onboarding} onComplete=${(p)=>{setProfile(p);setOnboarded(true)}}/>`;
  }

  const tabs=[
    {id:'home',label:'Accueil',icon:Icons.home},
    {id:'training',label:'Training',icon:Icons.training},
    {id:'stats',label:'Stats',icon:Icons.stats},
    {id:'nutrition',label:'Nutrition',icon:Icons.nutrition},
    {id:'profile',label:'Profil',icon:Icons.profile},
  ];

  return html`<${AppContext.Provider} value=${contextValue}>
    <div class="h-full flex flex-col bg-bgPrimary">
      <div class="flex-1 overflow-hidden">
        ${page==='home'?html`<${HomePage}/>`:null}
        ${page==='training'?html`<${TrainingPage}/>`:null}
        ${page==='stats'?html`<${StatsPage}/>`:null}
        ${page==='nutrition'?html`<${NutritionPage}/>`:null}
        ${page==='profile'?html`<${ProfilePage}/>`:null}
      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="flex justify-around items-center pt-2 max-w-md mx-auto">
          ${tabs.map(t=>html`
            <button key=${t.id} onClick=${()=>setPage(t.id)} class="tab-item ${page===t.id?'active':''}">
              ${t.icon}
              <span>${t.label}</span>
            </button>
          `)}
        </div>
      </div>
    </div>
  <//>`;
}

// ============================================================
// RENDER
// ============================================================
ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
